<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Forma — S.P.N. Corporate Services</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#1E3A5F;--blue:#2563EB;--blue-lt:#EFF6FF;
  --green:#16A34A;--green-lt:#DCFCE7;
  --red:#DC2626;--red-lt:#FEE2E2;
  --amber:#D97706;--amber-lt:#FEF3C7;
  --gray:#6B7280;--border:#E5E7EB;--bg:#F0F4F8;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1);
  --r:10px;--font:'Segoe UI',system-ui,sans-serif
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:#1F2937;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* Nav */
.nav{background:var(--navy);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.nav-brand{flex:1}
.nav-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.nav-sub{font-size:11px;color:#94A3B8}
.dot{width:8px;height:8px;border-radius:50%;background:#EF4444;flex-shrink:0;transition:background .3s}
.dot.on{background:#22C55E}
.dot-lbl{font-size:11px;color:#94A3B8}

/* Container */
.wrap{max-width:1200px;margin:0 auto;padding:20px}

/* Card */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:20px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:#F1F5F9;color:#334155;border:1px solid var(--border)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}

/* Form */
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.fc{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);color:#1F2937;background:#fff;transition:border-color .15s}
.fc:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.fc{cursor:pointer}

/* Toast */
#toast{position:fixed;top:64px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.ti{background:#1F2937;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);animation:tslide .2s ease;max-width:280px}
.ti.ok{background:var(--green)}.ti.err{background:var(--red)}.ti.warn{background:var(--amber)}
@keyframes tslide{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Overlay / Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:mup .2s ease}
@keyframes mup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mt{font-size:16px;font-weight:700;color:var(--navy)}
.mc{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);line-height:1;padding:2px 6px;border-radius:4px}
.mc:hover{background:#F1F5F9}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Dashboard */
.dash-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.dash-title{font-size:20px;font-weight:700;color:var(--navy)}
.grid-co{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.co-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:18px;border:1px solid var(--border);transition:box-shadow .15s,transform .15s;cursor:default}
.co-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.co-name{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:2px}
.co-meta{font-size:12px;color:var(--gray);margin-bottom:12px;line-height:1.7}
.co-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ychips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.ychip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:opacity .15s}
.ychip:hover{opacity:.8}
.ychip.draft{background:var(--amber-lt);color:#92400E}
.ychip.final{background:var(--green-lt);color:#166534}
.ychip.none{background:#F1F5F9;color:#64748B}
.card-acts{display:flex;gap:4px}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--gray)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-txt{font-size:16px;font-weight:500;margin-bottom:6px}
.empty-sub{font-size:13px;margin-bottom:20px}

/* Breadcrumb */
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray);margin-bottom:16px;flex-wrap:wrap}
.bc a{color:var(--blue);cursor:pointer;text-decoration:none}
.bc a:hover{text-decoration:underline}
.bc-sep{color:#CBD5E1}

/* Timeline */
.timeline{display:flex;align-items:stretch;overflow-x:auto;background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;padding:2px 0}
.ty{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 16px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;font-size:13px;color:var(--gray);flex-shrink:0}
.ty.active{border-bottom-color:var(--blue);color:var(--blue);font-weight:700}
.ty:hover:not(.active){background:#F8FAFC}
.ty-st{font-size:10px;padding:1px 6px;border-radius:10px}
.ty-st.draft{background:var(--amber-lt);color:#92400E}
.ty-st.final{background:var(--green-lt);color:#166534}
.ty-del{width:16px;height:16px;border-radius:50%;background:#FEE2E2;color:#DC2626;border:none;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;font-weight:700;flex-shrink:0;opacity:.7;transition:opacity .15s}
.ty-del:hover{opacity:1;background:#DC2626;color:#fff}
.ty-add{display:flex;align-items:center;padding:8px 12px}

/* Editor */
.ed-hdr{background:#fff;border-radius:var(--r);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.ed-co-name{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:2px}
.ed-co-meta{font-size:12px;color:var(--gray)}
.ed-tabs{display:flex;border-bottom:2px solid var(--border);background:#fff;border-radius:var(--r) var(--r) 0 0;padding:0 8px;margin-bottom:0;box-shadow:var(--shadow)}
.etab{padding:12px 20px;border:none;background:none;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--font);transition:all .15s}
.etab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* Financial table */
.ft{width:100%;border-collapse:collapse;font-size:13px}
.ft th{background:var(--navy);color:#fff;padding:10px 12px;text-align:right;font-weight:600;font-size:12px}
.ft th:first-child{text-align:left}
.ft td{padding:7px 12px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
.ft tr:hover td{background:#FAFBFF}
.sh td{background:#F0F4F8;font-weight:700;font-size:12px;color:var(--navy);padding:7px 12px;letter-spacing:.3px;cursor:default}
.ft tr:hover.sh td{background:#F0F4F8}
.tr-total td{font-weight:700;border-top:2.5px solid #CBD5E1;border-bottom:2.5px solid #CBD5E1;background:#FAFBFF}
.tr-sub td{font-weight:600;border-top:1px solid var(--border)}
.ind td:first-child{padding-left:24px}
.num-r{text-align:right}
.ni{width:100%;text-align:right;border:1px solid transparent;border-radius:4px;padding:3px 6px;font-size:13px;font-family:var(--font);background:transparent;color:inherit;-moz-appearance:textfield}
.ni::-webkit-inner-spin-button,.ni::-webkit-outer-spin-button{-webkit-appearance:none}
.ni:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.ni:disabled{color:var(--blue);font-weight:600;cursor:default}
.cv{color:var(--blue);font-weight:600;text-align:right;display:block}
.cv.neg{color:var(--red)}
.diff-ok{color:var(--green);font-weight:700}
.diff-err{color:var(--red);font-weight:700}
.bs-miss{background:#FEF2F2 !important;border-left:3px solid #DC2626 !important;animation:bsMissPulse 2s ease-in-out infinite}
.bs-miss td{color:#991B1B !important}
.bs-miss input.ni{border-color:#DC2626 !important;background:#FFF5F5 !important;color:#991B1B !important}
.bs-miss input.ni::placeholder{color:#FCA5A5}
.num-warn{color:#DC2626 !important;font-weight:700 !important}
@keyframes bsMissPulse{0%,100%{background:#FEF2F2 !important}50%{background:#FFE4E6 !important}}
.diff-err{color:var(--red);font-weight:700}
.pct-ch{font-size:10px;color:var(--gray);margin-left:4px}
.pct-up{color:var(--green)}.pct-dn{color:var(--red)}

/* Settings */
.sp{background:#F8FAFC;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;align-items:end}
.sl{font-size:11px;font-weight:600;color:var(--gray);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#CBD5E1;border-radius:22px;cursor:pointer;transition:.2s}
.tsl::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked+.tsl{background:var(--blue)}
.tog input:checked+.tsl::before{transform:translateX(18px)}
.tog-row{display:flex;align-items:center;gap:8px;margin-top:2px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border-radius:8px;border:1px solid var(--border);padding:12px 14px}
.kl{font-size:11px;color:var(--gray);margin-bottom:3px;font-weight:500}
.kv{font-size:20px;font-weight:700;color:var(--navy)}
.kpi.pos .kv{color:var(--green)}.kpi.neg .kv{color:var(--red)}
.kpi.warn .kv{color:var(--amber)}

/* Base form */
.bg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.bfield label{display:block;font-size:11px;font-weight:600;color:var(--gray);margin-bottom:4px}
.bfield input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);text-align:right;color:#1F2937;-moz-appearance:textfield}
.bfield input:focus{outline:none;border-color:var(--blue)}

/* Sec title */
.stit{font-size:12px;font-weight:700;color:var(--navy);margin:16px 0 10px;padding-bottom:6px;border-bottom:2px solid #CBD5E1;text-transform:uppercase;letter-spacing:.5px}

/* Status badge */
.sbadge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.sbadge.draft{background:var(--amber-lt);color:#92400E}
.sbadge.final{background:var(--green-lt);color:#166534}

/* Export bar */
.xbar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 0;border-top:1px solid var(--border);margin-top:8px}

/* Bank Analysis */
.score-ring{display:flex;flex-direction:column;align-items:center;justify-content:center;width:120px;height:120px;border-radius:50%;border:8px solid;font-family:var(--font);flex-shrink:0}
.score-ring.green{border-color:var(--green);color:var(--green)}
.score-ring.amber{border-color:var(--amber);color:var(--amber)}
.score-ring.red{border-color:var(--red);color:var(--red)}
.score-num{font-size:32px;font-weight:800;line-height:1}
.score-lbl{font-size:11px;font-weight:600;margin-top:2px}
.score-level{font-size:13px;font-weight:700;margin-top:4px}
.flag-tbl{width:100%;border-collapse:collapse;font-size:12px}
.flag-tbl th{background:#F0F4F8;padding:6px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--navy)}
.flag-tbl td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.flag-ok{color:var(--green);font-weight:600}
.flag-warn{color:var(--amber);font-weight:600}
.flag-critical{color:var(--red);font-weight:700}
.sc-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.sc-name{font-weight:700;font-size:13px;color:var(--navy)}
.sc-meta{font-size:11px;color:var(--gray);margin-top:2px}

/* Notes table */
.notes-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.notes-tbl th{background:#F0F4F8;padding:6px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--navy);border-bottom:2px solid var(--border)}
.notes-tbl th.num-r{text-align:right}
.notes-tbl td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.notes-tbl tr:hover td{background:#FAFBFF}

/* Responsive */
@media(max-width:640px){
  .wrap{padding:12px}
  .grid-co{grid-template-columns:1fr}
  .sgrid{grid-template-columns:1fr 1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
}

/* ===== FULL STATEMENT MODE ===== */
.fs-import-banner{background:linear-gradient(135deg,#1E3A5F,#2563EB);border-radius:12px;padding:18px 22px;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
.fs-import-title{font-size:15px;font-weight:700;margin-bottom:3px}
.fs-import-sub{font-size:11px;opacity:.8}
.fs-btns{display:flex;gap:8px;flex-wrap:wrap}
.fs-btn-white{background:#fff;color:var(--navy);border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);transition:opacity .15s}
.fs-btn-white:hover{opacity:.85}
.fs-section{margin-bottom:22px}
.fs-section-title{font-size:12px;font-weight:700;color:var(--navy);border-bottom:2px solid var(--border);padding-bottom:6px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px;display:flex;align-items:center;justify-content:space-between}
.fs-badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;background:var(--blue-lt);color:var(--blue)}
.fs-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:680px){.fs-2col{grid-template-columns:1fr}}
.det-tbl{width:100%;border-collapse:collapse;font-size:12px}
.det-tbl th{background:#F0F4F8;padding:6px 10px;font-weight:700;color:var(--navy);font-size:11px;text-align:right}
.det-tbl th:first-child{text-align:left}
.det-tbl td{padding:5px 10px;border-bottom:1px solid #F1F5F9}
.det-tbl td:not(:first-child){text-align:right;font-family:'Courier New',monospace;font-size:12px}
.det-tbl .dt-sub td{font-weight:700;background:#F8FAFC;border-top:1.5px solid #CBD5E1}
.det-tbl .dt-hdr td{background:#EFF6FF;font-weight:700;color:var(--navy);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
.target-panel{background:#F0FDF4;border:1.5px solid var(--green);border-radius:12px;padding:18px;margin-bottom:16px}
.target-title{font-size:13px;font-weight:700;color:#166534;margin-bottom:12px}
.target-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:12px}
.target-result-box{background:#fff;border-radius:8px;padding:14px;margin-top:12px}
.tr-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #F1F5F9;font-size:12px}
.tr-row:last-child{border:none;font-weight:700;font-size:13px;padding-top:8px}
.tr-val{font-family:'Courier New',monospace;font-weight:600;color:var(--navy)}
.tr-val.pos{color:var(--green)}.tr-val.neg{color:var(--red)}
.clone-panel{background:var(--amber-lt);border:1.5px solid var(--amber);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.import-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--green-lt);color:#166534;margin-bottom:12px}
</style>
</head>

<script>

let db = null;

  view: 'dashboard',       // 'dashboard' | 'editor'

  years: {},               // {companyId: {year: yearData}}

// ===== HELPERS =====
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function n(v){return v||0}

// Thai accounting: "(6,040,349.12)" → -6040349.12  |  "1,234.56" → 1234.56  |  "-" → 0
function parseAccountingNumber(v){
  if(v===null||v===undefined)return 0;
  const s=String(v).trim();
  if(s===''||s==='-'||s==='—'||s==='–'||s==='N/A')return 0;
  // parentheses denote negative
  const neg=/^\(.*\)$/.test(s);
  const clean=s.replace(/^\(/,'').replace(/\)$/,'').replace(/,/g,'').trim();
  const num=parseFloat(clean);
  if(isNaN(num))return 0;
  return neg?-num:num;
}

// Self-test (runs once at startup, silent on pass)
(function selfTestPAN(){
  const t=(input,expected)=>{
    const got=parseAccountingNumber(input);
    if(Math.abs(got-expected)>0.001)console.error(`parseAccountingNumber("${input}") expected ${expected} got ${got}`);
  };
  t('(6,040,349.12)',-6040349.12);
  t('(220,798.28)',-220798.28);
  t('1,641,946.27',1641946.27);
  t('-',0); t('',0); t('—',0); t(null,0);
  t('123.45',123.45); t('(0)',0);
})();

function fmt(v){
  if(v===null||v===undefined||v===''||v===0)return '-';
  if(!isFinite(v))return '-';
  const abs=Math.abs(v);
  const s=abs.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
  return v<0?`(${s})`:s;
}
function fmtNum(v){return (v||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtPct(v){return isFinite(v)?v.toFixed(2)+'%':'-'}
function fmtPctChg(draft,base){
  if(!base||base===0)return '';
  const pct=((draft-base)/Math.abs(base))*100;
  const cls=pct>=0?'pct-up':'pct-dn';
  const sign=pct>=0?'+':'';
  return `<span class="pct-ch ${cls}">${sign}${pct.toFixed(1)}%</span>`;
}

function compute(draft,settings){
  const s=Object.assign(defaultSettings(),settings);
  let d=Object.assign({},draft);
  const taxRate=s.taxRate||0.20;
  const targetTax=s.targetTax||0;
  const mode=s.taxMode||'auto';

  if(mode==='target-rev'){
    d.rev=(targetTax/taxRate)+n(d.cogs)+n(d.sellingExp)+n(d.admin)+n(d.depExp)+n(d.interestExp)-n(d.otherRev);
  }else if(mode==='target-cogs'){
    d.cogs=n(d.rev)+n(d.otherRev)-n(d.sellingExp)-n(d.admin)-n(d.depExp)-n(d.interestExp)-(targetTax/taxRate);
  }

  const totalRev=n(d.rev)+n(d.otherRev);
  const grossProfit=totalRev-n(d.cogs);
  const ebitda=grossProfit-n(d.sellingExp)-n(d.admin);
  const ebit=ebitda-n(d.depExp);
  const pbt=ebit-n(d.interestExp);
  const tax=mode==='auto'?Math.max(0,pbt*taxRate):targetTax;
  const netIncome=pbt-tax;

  const reEnd=n(d.reBegin)+netIncome;
  const totalEquity=n(d.capital)+reEnd;
  const currentLiab=n(d.ap)+n(d.shortLoan)+n(d.longLoan)+n(d.taxPay)+n(d.ocl);
  const nonCurrentLiab=n(d.longLoanNC)+n(d.directorLoan);
  const totalLiab=currentLiab+nonCurrentLiab;
  const totalLiabEq=totalLiab+totalEquity;
  let cash=n(d.cash);
  if(s.cashAutoBalance){
    cash=totalLiabEq-n(d.ar)-n(d.loanAr)-n(d.inventory)-n(d.oca)-n(d.deposit)-n(d.ppe)-n(d.intangible);
  }
  const currentAssets=cash+n(d.ar)+n(d.loanAr)+n(d.inventory)+n(d.oca)+n(d.deposit);
  const nonCurrentAssets=n(d.ppe)+n(d.intangible);
  const totalAssets=currentAssets+nonCurrentAssets;
  const diff=totalAssets-totalLiabEq;

  const grossMargin=totalRev!==0?grossProfit/totalRev*100:0;
  const ebitMargin=totalRev!==0?ebit/totalRev*100:0;
  const netMargin=totalRev!==0?netIncome/totalRev*100:0;
  const de=totalEquity!==0?totalLiab/totalEquity:0;
  const debtRatio=totalAssets!==0?totalLiab/totalAssets:0;
  const currentRatio=currentLiab!==0?currentAssets/currentLiab:0;
  const interestCoverage=n(d.interestExp)!==0?ebit/n(d.interestExp):null;

  return{
    d,
    pl:{totalRev,grossProfit,ebitda,ebit,pbt,tax,netIncome},
    bs:{cash,reEnd,totalEquity,currentLiab,nonCurrentLiab,totalLiab,totalLiabEq,currentAssets,nonCurrentAssets,totalAssets,diff},
    kpi:{grossMargin,ebitMargin,netMargin,de,debtRatio,currentRatio,interestCoverage}
  };
}

function computeBase(base){
  const b=Object.assign(defaultBase(),base);
  const totalRev=n(b.rev)+n(b.otherRev);
  const grossProfit=totalRev-n(b.cogs);
  const ebitda=grossProfit-n(b.sellingExp)-n(b.admin);
  const ebit=ebitda-n(b.depExp);
  const pbt=ebit-n(b.interestExp);
  const tax=n(b.tax);
  const netIncome=(b.netIncome!==undefined&&b.netIncome!==null&&b.netIncome!==''&&String(b.netIncome).trim()!==''&&Number(b.netIncome)!==0)?n(b.netIncome):(pbt-tax);
  const reEnd=n(b.reBegin)+netIncome;
  const totalEquity=n(b.capital)+reEnd;
  const currentLiab=n(b.ap)+n(b.shortLoan)+n(b.longLoan)+n(b.taxPay)+n(b.ocl);
  const nonCurrentLiab=n(b.longLoanNC)+n(b.directorLoan);
  const totalLiab=currentLiab+nonCurrentLiab;
  const totalLiabEq=totalLiab+totalEquity;
  const currentAssets=n(b.cash)+n(b.ar)+n(b.loanAr)+n(b.inventory)+n(b.oca)+n(b.deposit);
  const nonCurrentAssets=n(b.ppe)+n(b.intangible);
  const totalAssets=currentAssets+nonCurrentAssets;
  const diff=totalAssets-totalLiabEq;
  return{
    pl:{totalRev,grossProfit,ebitda,ebit,pbt,tax,netIncome},
    bs:{cash:n(b.cash),reEnd,totalEquity,currentLiab,nonCurrentLiab,totalLiab,totalLiabEq,currentAssets,nonCurrentAssets,totalAssets,diff}
  };
}

function computeCF(base,draft,settings,cf,res){
  const b=Object.assign(defaultBase(),base);
  const d=res.d;
  const bs=res.bs;
  const pl=res.pl;
  const c=Object.assign(defaultCF(),cf);
  const dep=n(c.depreciation);
  const interestPaid=n(c.interestPaid);
  const loanProceeds=n(c.loanProceeds);
  const loanRepayment=n(c.loanRepayment);
  // Operating
  const dAR=n(d.ar)-n(b.ar);
  const dLoanAR=n(d.loanAr)-n(b.loanAr);
  const dInventory=n(d.inventory)-n(b.inventory);
  const dOCA=n(d.oca)-n(b.oca);
  const dDeposit=n(d.deposit)-n(b.deposit);
  const dAP=n(d.ap)-n(b.ap);
  const dTaxPay=n(d.taxPay)-n(b.taxPay);
  const dOCL=n(d.ocl)-n(b.ocl);
  const opCF=pl.netIncome+dep-dAR-dLoanAR-dInventory-dOCA-dDeposit+dAP+dTaxPay+dOCL-interestPaid;
  // Investing
  const dPPE=n(d.ppe)-n(b.ppe);
  const dIntangible=n(d.intangible)-n(b.intangible);
  const capex=dPPE+dep;
  const invCF=-(capex>0?capex:dPPE)-(dIntangible>0?dIntangible:0);
  // Financing
  const dCapital=n(d.capital)-n(b.capital);
  const dShortLoan=n(d.shortLoan)-n(b.shortLoan);
  const dDirectorLoan=n(d.directorLoan)-n(b.directorLoan);
  const divPaid=n(c.dividends);
  const finCF=dCapital+loanProceeds-loanRepayment+dShortLoan+dDirectorLoan-divPaid;
  const netCF=opCF+invCF+finCF;
  const beginCash=n(b.cash);
  const endCash=beginCash+netCF;
  return{
    netIncome:pl.netIncome,dep,
    dAR,dLoanAR,dInventory,dOCA,dDeposit,dAP,dTaxPay,dOCL,
    interestPaid:-interestPaid,
    opCF,
    dPPE,dIntangible,capex,invCF,
    dCapital,dShortLoan,dDirectorLoan,
    loanProceeds,loanRepayment:-loanRepayment,
    divPaid:-divPaid,finCF,
    netCF,beginCash,endCash,bsCash:bs.cash
  };
}

function computeBankability(pl,bs,kpi,cfRes){
  let score=0;
  const strengths=[],risks=[],recs=[];
  const nm=kpi.netMargin,gm=kpi.grossMargin,cr=kpi.currentRatio,de=kpi.de;
  const ic=kpi.interestCoverage,dr=kpi.debtRatio;
  // Net Margin (12)
  if(nm>=10){score+=12;strengths.push(`Net Margin ${nm.toFixed(1)}% — ดี`);}
  else if(nm>=5)score+=7;
  else if(nm>=0){score+=2;risks.push(`Net Margin ${nm.toFixed(1)}% — ต่ำ`);}
  else risks.push('Net Margin ติดลบ');
  // Gross Margin (10)
  if(gm>=25){score+=10;strengths.push(`Gross Margin ${gm.toFixed(1)}% — ดี`);}
  else if(gm>=15)score+=7;
  else if(gm>=5){score+=3;risks.push(`Gross Margin ${gm.toFixed(1)}% — ต่ำ`);}
  else risks.push('Gross Margin ต่ำมาก');
  // Current Ratio (15)
  if(cr>=2){score+=15;strengths.push(`Current Ratio ${cr.toFixed(2)} — ดี`);}
  else if(cr>=1.5)score+=12;
  else if(cr>=1){score+=6;risks.push(`Current Ratio ${cr.toFixed(2)} — ต่ำ`);}
  else risks.push(`Current Ratio ${cr.toFixed(2)} — ต่ำกว่า 1 วิกฤต`);
  // D/E (15)
  if(de<=1){score+=15;strengths.push(`D/E ${de.toFixed(2)} — ดี`);}
  else if(de<=2)score+=10;
  else if(de<=3){score+=5;risks.push(`D/E ${de.toFixed(2)} — สูง`);}
  else risks.push(`D/E ${de.toFixed(2)} — สูงมาก`);
  // Interest Coverage (15)
  if(ic===null){score+=8;}
  else if(ic>=3){score+=15;strengths.push(`Interest Coverage ${ic.toFixed(1)} — ดี`);}
  else if(ic>=1.5)score+=8;
  else{risks.push(`Interest Coverage ${ic.toFixed(1)} — ต่ำกว่า 1.5`);}
  // Operating CF (10)
  if(cfRes&&cfRes.opCF>0){score+=10;strengths.push('กระแสเงินสดดำเนินงานเป็นบวก');}
  else if(cfRes&&cfRes.opCF<=0)risks.push('กระแสเงินสดดำเนินงานติดลบ');
  // Cash (8)
  if(bs.cash>0)score+=8;
  else risks.push('เงินสดติดลบ');
  // Tax consistency (8)
  if(pl.pbt>0){
    const tp=pl.tax/pl.pbt*100;
    if(tp>=15){score+=8;strengths.push(`ภาษี ${tp.toFixed(1)}% ของ PBT สมเหตุสมผล`);}
    else if(tp>=5)score+=4;
    else risks.push(`ภาษี ${tp.toFixed(1)}% ของ PBT — อาจถูกตั้งคำถาม`);
  }else score+=4;
  // Revenue (7)
  if(pl.totalRev>0)score+=7;
  else risks.push('ยังไม่มีรายได้');
  // Recommendations
  if(de>2)recs.push('เพิ่มทุนหรือแปลงเงินกู้กรรมการเป็นทุน เพื่อลด D/E');
  if(cr<1.5)recs.push('เพิ่มเงินทุนหมุนเวียน หรือปรับโครงสร้างหนี้ระยะสั้นเป็นระยะยาว');
  if(nm<5)recs.push('ลดต้นทุนหรือค่าใช้จ่าย เพื่อเพิ่ม Net Margin');
  if(ic!==null&&ic<2)recs.push('ลดภาระดอกเบี้ย หรือเพิ่ม EBIT ก่อนยื่นกู้');
  if(pl.pbt>0&&pl.tax/pl.pbt<0.1)recs.push('ปรับภาษีให้ใกล้ 20% ของกำไรก่อนภาษี เพื่อความน่าเชื่อถือ');
  if(bs.cash<0)recs.push('แก้ปัญหาเงินสดติดลบก่อน — ธนาคารจะไม่อนุมัติ');
  const level=score>=80?'ดีมาก':score>=65?'ดี':score>=50?'พอใช้':score>=35?'เสี่ยง':'เสี่ยงสูง';
  const levelCls=score>=65?'green':score>=50?'amber':'red';
  return{score,level,levelCls,strengths,risks,recommendations:recs};
}

function computeRedFlags(pl,bs,kpi,cfRes,base){
  const flags=[];
  function flag(label,status,desc,suggest){flags.push({label,status,desc,suggest});}
  if(Math.abs(bs.diff)>1)flag('งบดุลไม่ดุล','critical',`ส่วนต่าง ${fmt(bs.diff)}`,'ตรวจสอบ BS ทุกรายการ');
  else flag('งบดุล','ok','สมดุล','');
  flag('เงินสด',bs.cash<0?'critical':bs.cash===0?'warn':'ok',
    bs.cash<0?`เงินสด ${fmt(bs.cash)}`:`${fmt(bs.cash)}`,
    bs.cash<0?'เพิ่มเงินสด หรือตรวจ Auto-Balance':'');
  const crSt=kpi.currentRatio<1?'critical':kpi.currentRatio<1.5?'warn':'ok';
  flag('Current Ratio',crSt,kpi.currentRatio.toFixed(2),crSt!=='ok'?'เพิ่มสินทรัพย์หมุนเวียน หรือลดหนี้ระยะสั้น':'');
  const deSt=kpi.de>3?'critical':kpi.de>2?'warn':'ok';
  flag('D/E Ratio',deSt,kpi.de.toFixed(2),deSt!=='ok'?'เพิ่มทุน หรือลดหนี้':'');
  if(kpi.interestCoverage!==null){
    const icSt=kpi.interestCoverage<1.5?'critical':kpi.interestCoverage<2.5?'warn':'ok';
    flag('Interest Coverage',icSt,kpi.interestCoverage.toFixed(2),icSt!=='ok'?'เพิ่ม EBIT หรือลดดอกเบี้ย':'');
  }
  if(pl.pbt>0){
    const tp=pl.tax/pl.pbt*100;
    flag('อัตราภาษีต่อ PBT',tp<5?'critical':tp<15?'warn':'ok',`${tp.toFixed(1)}%`,tp<5?'ปรับภาษีให้ใกล้ 20% — ธนาคารตั้งคำถาม':'');
  }
  if(cfRes)flag('กระแสเงินสดดำเนินงาน',cfRes.opCF<0?'warn':'ok',fmt(cfRes.opCF),cfRes.opCF<0?'ตรวจสอบเงินทุนหมุนเวียน':'');
  flag('กำไรสุทธิ',pl.netIncome<0?'critical':pl.netIncome===0?'warn':'ok',fmt(pl.netIncome),pl.netIncome<0?'แก้โครงสร้างรายได้/ค่าใช้จ่าย':'');
  flag('รายได้รวม',pl.totalRev<=0?'critical':'ok',fmt(pl.totalRev),pl.totalRev<=0?'กรอกรายได้ให้ครบ':'');
  // Director loan too high
  if(n(base.directorLoan)>0&&bs.totalAssets>0){
    const dlRatio=n(base.directorLoan)/bs.totalAssets*100;
    if(dlRatio>30)flag('เงินกู้กรรมการสูง','warn',`${dlRatio.toFixed(1)}% ของสินทรัพย์`,'พิจารณาแปลงเป็นทุน');
  }
  return flags;
}

function computeLoanCapacity(ebitda,interestRate,termMonths,dscrTarget){
  if(!ebitda||ebitda<=0||!interestRate||!termMonths||!dscrTarget)return null;
  const annualDS=ebitda/dscrTarget;
  const monthlyDS=annualDS/12;
  const r=interestRate/12;
  const loanCapacity=r>0?monthlyDS*(1-Math.pow(1+r,-termMonths))/r:monthlyDS*termMonths;
  return{ebitda,annualDS,monthlyDS,loanCapacity,dscr:dscrTarget};
}

// ===== FIREBASE INIT =====
function initFirebase(){
  const s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s1.onload=()=>{
    const s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js';
    s2.onload=()=>{
      try{
        firebase.initializeApp(FB_CFG);
        db=firebase.firestore();
        db.enablePersistence({synchronizeTabs:false}).catch(()=>{});
        S.online=true;
        document.getElementById('dot').classList.add('on');
        document.getElementById('dot-lbl').textContent='ออนไลน์';
        loadFromFirebase();
      }catch(e){console.warn('Firebase:',e);}
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

async function loadFromFirebase(){
  try{
    // Load companies
    const snap=await db.collection('proforma_companies').get();
    snap.forEach(doc=>{
      const c=doc.data();
      if(!S.companies.find(x=>x.id===c.id)){
        S.companies.push(c);
      }
    });
    lsSaveCompanies();
    // Load years for all companies
    const ySnap=await db.collection('proforma_years').get();
    ySnap.forEach(doc=>{
      const data=doc.data();
      const cId=data.cId;
      const yr=data.yr;
      if(cId&&yr){
        if(!S.years[cId])S.years[cId]={};
        if(!S.years[cId][yr]){
          S.years[cId][yr]=data;
          lsSaveYear(cId,yr,data);
        }
      }
    });
    render();
  }catch(e){console.warn('Firebase load:',e);}
}

  const app=document.getElementById('app');

}

function esc(s){
  if(!s)return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  const settings=Object.assign(defaultSettings(),yd.settings||{});

  const res=compute(draft,settings);
  const baseRes=computeBase(base);
  const d=res.d;const pl=res.pl;const bs=res.bs;const kpi=res.kpi;
  const mode=settings.taxMode||'auto';
  const cashAuto=settings.cashAutoBalance;

  function inp(field,val,disabled=false){
    const v=(val!==undefined&&val!==null)?val:n(d[field]);
    return`<input class="ni" type="number" step="0.01" id="di-${field}" value="${v}"
      ${disabled?'disabled':''} onchange="onDraftChange('${field}',this.value)">`;
  }
  function cv(id,val,neg=false){
    return`<span class="cv${neg&&val<0?' neg':''}" id="${id}">${fmt(val)}</span>`;
  }
  function bv(v){return`<span style="color:var(--gray)">${fmt(v)}</span>`;}

  const isRev=mode==='target-rev',isCogs=mode==='target-cogs';
  const diffHtml=Math.abs(bs.diff)<1
    ?`<span class="diff-ok">✓ ดุล (${fmt(bs.diff)})</span>`
    :`<span class="diff-err">⚠ ไม่ดุล (${fmt(bs.diff)})</span>`;

  function kpiCard(label,val,unit,cls,id){
    return`<div class="kpi ${cls}" id="${id}-box"><div class="kl">${label}</div>`+
      `<div class="kv" id="${id}">${val}${unit}</div></div>`;
  }
  const gmCls=kpi.grossMargin>=20?'pos':kpi.grossMargin>=0?'':'neg';
  const emCls=kpi.ebitMargin>=10?'pos':kpi.ebitMargin>=0?'':'neg';
  const nmCls=kpi.netMargin>=5?'pos':kpi.netMargin>=0?'':'neg';
  const deCls=kpi.de<1?'pos':kpi.de<2?'warn':'neg';
  const drCls=kpi.debtRatio<0.5?'pos':kpi.debtRatio<0.7?'warn':'neg';
  const crCls=kpi.currentRatio>=2?'pos':kpi.currentRatio>=1?'warn':'neg';
  const icCls=kpi.interestCoverage===null?'':kpi.interestCoverage>=3?'pos':kpi.interestCoverage>=1.5?'warn':'neg';

  return`
  <div class="sp">
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">การตั้งค่าการคำนวณ</div>
    <div class="sgrid">
      <div>
        <span class="sl">โหมดภาษี</span>
        <select class="fc" id="s-taxMode" onchange="onSettingChange('taxMode',this.value)">
          <option value="auto" ${mode==='auto'?'selected':''}>Auto (PBT × Rate)</option>
          <option value="target-rev" ${mode==='target-rev'?'selected':''}>Target Tax → คำนวณ REV</option>
          <option value="target-cogs" ${mode==='target-cogs'?'selected':''}>Target Tax → คำนวณ COGS</option>
        </select>
      </div>
      <div>
        <span class="sl">อัตราภาษี (%)</span>
        <input type="number" class="fc" id="s-taxRate" step="0.1" min="0" max="100"
          value="${(settings.taxRate*100).toFixed(1)}"
          onchange="onSettingChange('taxRate',parseFloat(this.value)/100)">
      </div>
      <div id="target-tax-wrap" ${mode==='auto'?'style="display:none"':''}>
        <span class="sl">ภาษีเป้าหมาย (บาท)</span>
        <input type="number" class="fc" id="s-targetTax" step="1000" value="${settings.targetTax||0}"
          onchange="onSettingChange('targetTax',parseFloat(this.value)||0)">
      </div>
      <div>
        <span class="sl">เงินสด</span>
        <div class="tog-row">
          <label class="tog">
            <input type="checkbox" id="s-cashAuto" ${cashAuto?'checked':''}
              onchange="onSettingChange('cashAutoBalance',this.checked)">
            <span class="tsl"></span>
          </label>
          <span style="font-size:12px;color:var(--gray)">Auto-Balance</span>
        </div>
      </div>
    </div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr))">
    ${kpiCard('Gross Margin',fmtPct(kpi.grossMargin),'',gmCls,'cv-kpi-gm')}
    ${kpiCard('EBIT Margin',fmtPct(kpi.ebitMargin),'',emCls,'cv-kpi-em')}
    ${kpiCard('Net Margin',fmtPct(kpi.netMargin),'',nmCls,'cv-kpi-nm')}
    ${kpiCard('D/E Ratio',isFinite(kpi.de)?kpi.de.toFixed(2):'-',' เท่า',deCls,'cv-kpi-de')}
    ${kpiCard('Debt Ratio',isFinite(kpi.debtRatio)?(kpi.debtRatio*100).toFixed(1)+'%':'','',drCls,'cv-kpi-dr')}
    ${kpiCard('Current Ratio',isFinite(kpi.currentRatio)?kpi.currentRatio.toFixed(2):'-',' เท่า',crCls,'cv-kpi-cr')}
    ${kpiCard('Interest Coverage',kpi.interestCoverage!==null?kpi.interestCoverage.toFixed(1):'-',' เท่า',icCls,'cv-kpi-ic')}
  </div>

  <!-- P&L -->
  <div class="card" style="overflow-x:auto;margin-bottom:16px;padding:0">
    <div style="padding:14px 16px 4px;font-size:13px;font-weight:700;color:var(--navy);border-bottom:1px solid var(--border)">งบกำไรขาดทุนเบ็ดเสร็จ</div>
    <table class="ft"><thead><tr>
      <th style="width:42%">รายการ</th><th style="width:29%">ร่างปรับใหม่</th><th style="width:29%">ปีฐาน</th>
    </tr></thead><tbody>
      <tr class="sh"><td colspan="3">รายได้</td></tr>
      <tr class="ind">
        <td>รายได้จากการขาย/รับเหมา ${isRev?'<span style="font-size:10px;color:var(--blue)">[คำนวณ]</span>':''}</td>
        <td class="num-r">${inp('rev',d.rev,isRev)}</td><td class="num-r">${bv(base.rev)}</td>
      </tr>
      <tr class="ind"><td>รายได้อื่น</td><td class="num-r">${inp('otherRev')}</td><td class="num-r">${bv(base.otherRev)}</td></tr>
      <tr class="tr-sub"><td>รวมรายได้</td><td class="num-r">${cv('cv-totalRev',pl.totalRev)}</td><td class="num-r">${bv(baseRes.pl.totalRev)}</td></tr>
      <tr class="sh"><td colspan="3">ค่าใช้จ่าย</td></tr>
      <tr class="ind">
        <td>ต้นทุนขาย/ต้นทุนก่อสร้าง ${isCogs?'<span style="font-size:10px;color:var(--blue)">[คำนวณ]</span>':''}</td>
        <td class="num-r">${inp('cogs',d.cogs,isCogs)}</td><td class="num-r">${bv(base.cogs)}</td>
      </tr>
      <tr class="ind"><td>ค่าใช้จ่ายในการขาย</td><td class="num-r">${inp('sellingExp')}</td><td class="num-r">${bv(base.sellingExp)}</td></tr>
      <tr class="ind"><td>ค่าใช้จ่ายในการบริหาร</td><td class="num-r">${inp('admin')}</td><td class="num-r">${bv(base.admin)}</td></tr>
      <tr class="tr-sub"><td>กำไรขั้นต้น</td><td class="num-r">${cv('cv-grossProfit',pl.grossProfit)}</td><td class="num-r">${bv(baseRes.pl.grossProfit)}</td></tr>
      <tr class="ind"><td>ค่าเสื่อมราคา</td><td class="num-r">${inp('depExp')}</td><td class="num-r">${bv(base.depExp)}</td></tr>
      <tr class="tr-sub" style="background:#EFF6FF"><td><b>EBIT</b></td><td class="num-r">${cv('cv-ebit',pl.ebit)}</td><td class="num-r">${bv(baseRes.pl.ebit)}</td></tr>
      <tr class="ind"><td>ดอกเบี้ยจ่าย</td><td class="num-r">${inp('interestExp')}</td><td class="num-r">${bv(base.interestExp)}</td></tr>
      <tr class="tr-sub"><td>กำไรก่อนหักภาษี (PBT)</td><td class="num-r">${cv('cv-pbt',pl.pbt)}</td><td class="num-r">${bv(baseRes.pl.pbt)}</td></tr>
      <tr class="ind">
        <td>ภาษีเงินได้นิติบุคคล <span style="font-size:10px;color:var(--blue)">${mode==='auto'?`[${(settings.taxRate*100).toFixed(0)}%]`:'[target]'}</span></td>
        <td class="num-r">${cv('cv-tax',pl.tax)}</td><td class="num-r">${bv(base.tax)}</td>
      </tr>
      <tr class="tr-total"><td>กำไรสุทธิ</td><td class="num-r">${cv('cv-netIncome',pl.netIncome,true)}</td><td class="num-r">${bv(baseRes.pl.netIncome)}</td></tr>
    </tbody></table>
  </div>

  <!-- Balance Sheet -->
  <div class="card" style="overflow-x:auto;margin-bottom:16px;padding:0">
    <div style="padding:14px 16px 8px;font-size:13px;font-weight:700;color:var(--navy);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">
      งบฐานะการเงิน
      ${Math.abs(bs.diff)>=1?`<span style="font-size:11px;font-weight:600;background:#FEE2E2;color:#991B1B;padding:2px 10px;border-radius:20px">⚠ ไม่ดุล ${fmtNum(bs.diff)} บาท — ดูแถวสีแดงด้านล่าง</span>`:'<span style="font-size:11px;font-weight:600;background:#DCFCE7;color:#166534;padding:2px 10px;border-radius:20px">✓ ดุล</span>'}
    </div>
    ${Math.abs(bs.diff)>=1?`
    <div style="background:#FFF7ED;border-bottom:1px solid #FED7AA;padding:8px 14px;font-size:11px;color:#92400E">
      💡 <b>วิธีแก้:</b> รายการที่กรอกเป็น 0 แต่ควรมีค่า จะ<span style="background:#FEE2E2;padding:0 4px;border-radius:3px;font-weight:600">ไฮไลท์สีแดง</span> — กรอกให้ครบจนงบดุล &nbsp;|&nbsp;
      สินทรัพย์รวม <b>${fmtNum(bs.totalAssets)}</b> &nbsp;vs&nbsp; หนี้สิน+ทุนรวม <b>${fmtNum(bs.totalLiabEq)}</b> &nbsp;ต่าง <b style="color:#DC2626">${fmtNum(bs.diff)}</b>
    </div>`:''}
    <table class="ft"><thead><tr>
      <th style="width:42%">รายการ</th><th style="width:29%">ร่างปรับใหม่</th><th style="width:29%">ปีฐาน</th>
    </tr></thead><tbody>
      <tr class="sh"><td colspan="3">สินทรัพย์หมุนเวียน</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&!cashAuto&&n(d.cash)===0&&n(base.cash)>0?'bs-miss':''}"><td>เงินสด ${cashAuto?'<span style="font-size:10px;color:var(--blue)">[Auto]</span>':''}</td>
        <td class="num-r">${cashAuto?cv('cv-cash',bs.cash):inp('cash')}</td><td class="num-r">${bv(base.cash)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.ar)===0&&n(base.ar)>0?'bs-miss':''}"><td>ลูกหนี้การค้า</td><td class="num-r">${inp('ar')}</td><td class="num-r">${bv(base.ar)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.loanAr)===0&&n(base.loanAr)>0?'bs-miss':''}"><td>ลูกหนี้เงินกู้</td><td class="num-r">${inp('loanAr')}</td><td class="num-r">${bv(base.loanAr)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.inventory)===0&&n(base.inventory)>0?'bs-miss':''}"><td>สินค้าคงเหลือ</td><td class="num-r">${inp('inventory')}</td><td class="num-r">${bv(base.inventory)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.oca)===0&&n(base.oca)>0?'bs-miss':''}"><td>สินทรัพย์หมุนเวียนอื่น</td><td class="num-r">${inp('oca')}</td><td class="num-r">${bv(base.oca)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.deposit)===0&&n(base.deposit)>0?'bs-miss':''}"><td>เงินมัดจำ/เงินประกัน</td><td class="num-r">${inp('deposit')}</td><td class="num-r">${bv(base.deposit)}</td></tr>
      <tr class="tr-sub"><td>รวมสินทรัพย์หมุนเวียน</td><td class="num-r ${Math.abs(bs.diff)>=1&&bs.currentAssets===0?'num-warn':''}">${cv('cv-curAssets',bs.currentAssets)}</td><td class="num-r">${bv(baseRes.bs.currentAssets)}</td></tr>
      <tr class="sh"><td colspan="3">สินทรัพย์ไม่หมุนเวียน</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.ppe)===0&&n(base.ppe)>0?'bs-miss':''}"><td>ที่ดิน อาคาร อุปกรณ์ — สุทธิ</td><td class="num-r">${inp('ppe')}</td><td class="num-r">${bv(base.ppe)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.intangible)===0&&n(base.intangible)>0?'bs-miss':''}"><td>สินทรัพย์ไม่มีตัวตน</td><td class="num-r">${inp('intangible')}</td><td class="num-r">${bv(base.intangible)}</td></tr>
      <tr class="tr-sub"><td>รวมสินทรัพย์ไม่หมุนเวียน</td><td class="num-r">${cv('cv-ncAssets',bs.nonCurrentAssets)}</td><td class="num-r">${bv(baseRes.bs.nonCurrentAssets)}</td></tr>
      <tr class="tr-total"><td>รวมสินทรัพย์</td><td class="num-r">${cv('cv-totAssets',bs.totalAssets)}</td><td class="num-r">${bv(baseRes.bs.totalAssets)}</td></tr>
      <tr class="sh"><td colspan="3">หนี้สินหมุนเวียน</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.ap)===0&&n(base.ap)>0?'bs-miss':''}"><td>เจ้าหนี้การค้า</td><td class="num-r">${inp('ap')}</td><td class="num-r">${bv(base.ap)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.shortLoan)===0&&n(base.shortLoan)>0?'bs-miss':''}"><td>เงินกู้ระยะสั้น</td><td class="num-r">${inp('shortLoan')}</td><td class="num-r">${bv(base.shortLoan)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.longLoan)===0&&n(base.longLoan)>0?'bs-miss':''}"><td>เงินกู้ระยะยาว — ส่วนถึงกำหนด 1 ปี</td><td class="num-r">${inp('longLoan')}</td><td class="num-r">${bv(base.longLoan)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.taxPay)===0&&n(base.taxPay)>0?'bs-miss':''}"><td>ภาษีค้างจ่าย</td><td class="num-r">${inp('taxPay')}</td><td class="num-r">${bv(base.taxPay)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.ocl)===0&&n(base.ocl)>0?'bs-miss':''}"><td>หนี้สินหมุนเวียนอื่น</td><td class="num-r">${inp('ocl')}</td><td class="num-r">${bv(base.ocl)}</td></tr>
      <tr class="tr-sub"><td>รวมหนี้สินหมุนเวียน</td><td class="num-r ${Math.abs(bs.diff)>=1&&bs.currentLiab===0?'num-warn':''}">${cv('cv-curLiab',bs.currentLiab)}</td><td class="num-r">${bv(baseRes.bs.currentLiab)}</td></tr>
      <tr class="sh"><td colspan="3">หนี้สินไม่หมุนเวียน</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.longLoanNC)===0&&n(base.longLoanNC)>0?'bs-miss':''}"><td>เงินกู้ระยะยาว — ส่วนไม่หมุนเวียน</td><td class="num-r">${inp('longLoanNC')}</td><td class="num-r">${bv(base.longLoanNC)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.directorLoan)===0&&n(base.directorLoan)>0?'bs-miss':''}"><td>เงินกู้กรรมการ/ผู้ถือหุ้น</td><td class="num-r">${inp('directorLoan')}</td><td class="num-r">${bv(base.directorLoan)}</td></tr>
      <tr class="tr-sub"><td>รวมหนี้สินไม่หมุนเวียน</td><td class="num-r">${cv('cv-ncLiab',bs.nonCurrentLiab)}</td><td class="num-r">${bv(baseRes.bs.nonCurrentLiab)}</td></tr>
      <tr class="tr-sub"><td>รวมหนี้สิน</td><td class="num-r">${cv('cv-totLiab',bs.totalLiab)}</td><td class="num-r">${bv(baseRes.bs.totalLiab)}</td></tr>
      <tr class="sh"><td colspan="3">ส่วนของผู้ถือหุ้น</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.capital)===0?'bs-miss':''}"><td>ทุนชำระแล้ว</td><td class="num-r">${inp('capital')}</td><td class="num-r">${bv(base.capital)}</td></tr>
      <tr class="ind ${Math.abs(bs.diff)>=1&&n(d.reBegin)===0&&n(base.reBegin)!==0?'bs-miss':''}"><td>กำไรสะสมต้นปี</td><td class="num-r">${inp('reBegin')}</td><td class="num-r">${bv(base.reBegin)}</td></tr>
      <tr class="ind"><td>กำไรสุทธิปีนี้ <span style="font-size:10px;color:var(--blue)">[คำนวณ]</span></td>
        <td class="num-r">${cv('cv-netIncome2',pl.netIncome,true)}</td><td class="num-r">${bv(baseRes.pl.netIncome)}</td></tr>
      <tr class="tr-sub"><td>กำไรสะสมปลายปี</td><td class="num-r">${cv('cv-reEnd',bs.reEnd)}</td><td class="num-r">${bv(baseRes.bs.reEnd)}</td></tr>
      <tr class="tr-sub"><td>รวมส่วนของผู้ถือหุ้น</td><td class="num-r ${Math.abs(bs.diff)>=1&&bs.totalEquity===0?'num-warn':''}">${cv('cv-totEquity',bs.totalEquity)}</td><td class="num-r">${bv(baseRes.bs.totalEquity)}</td></tr>
      <tr class="tr-total"><td>รวมหนี้สินและส่วนของผู้ถือหุ้น</td><td class="num-r">${cv('cv-totLiabEq',bs.totalLiabEq)}</td><td class="num-r">${bv(baseRes.bs.totalLiabEq)}</td></tr>
      <tr style="${Math.abs(bs.diff)>=1?'background:#FEF2F2;':''}">
        <td colspan="2" style="font-size:12px;font-weight:600;color:${Math.abs(bs.diff)>=1?'#991B1B':'var(--gray)'}">ตรวจดุล (สินทรัพย์ − หนี้สิน+ทุน)</td>
        <td class="num-r" id="cv-diff">${diffHtml}</td>
      </tr>
    </tbody></table>
  </div>

  <div class="xbar">
    <button class="btn btn-success" onclick="exportExcel()">⬇ Export Excel</button>
    <button class="btn btn-secondary" onclick="exportComparativeExcel()">⬇ Comparative Excel</button>
    <button class="btn btn-primary" onclick="exportPDF()">📄 Export PDF</button>
    <button class="btn btn-secondary" onclick="autoSaveDraft()">💾 บันทึก Draft</button>
  </div>`;
}

// ===== CASH FLOW TAB =====
function renderCashFlowTab(yd){
  const settings=Object.assign(defaultSettings(),yd.settings||{});
  const draft=Object.assign(defaultDraft(),yd.draft||{});
  const base=Object.assign(defaultBase(),yd.base||{});
  const cf=Object.assign(defaultCF(),yd.cf||{});
  const res=compute(draft,settings);
  const r=computeCF(base,draft,settings,cf,res);

  function cfRow(label,val,indent,bold,id){
    const st=(indent?'padding-left:24px;':'')+(bold?'font-weight:700':'');
    const numSt='text-align:right;font-family:"Courier New",monospace;font-size:12px;'+(bold?'font-weight:700':'');
    return`<tr>
      <td style="${st};padding:4px 12px">${label}</td>
      <td style="${numSt};padding:4px 12px"${id?` id="${id}"`:''}>${fmt(val)}</td>
    </tr>`;
  }
  function secHdr(label){
    return`<tr><td colspan="2" style="padding:8px 12px;font-weight:700;color:var(--navy);font-size:11px;background:#F0F4F8;text-transform:uppercase;letter-spacing:.4px">${label}</td></tr>`;
  }
  function subTotal(label,val,id){
    return`<tr style="border-top:1.5px solid #CBD5E1">
      <td style="font-weight:700;padding:7px 12px">${label}</td>
      <td style="text-align:right;font-weight:700;font-family:'Courier New',monospace;font-size:12px;padding:7px 12px"${id?` id="${id}"`:''}>${fmt(val)}</td>
    </tr>`;
  }

  const cashMatch=Math.abs(r.endCash-r.bsCash)<1;

  return`
  <div style="font-size:13px;color:var(--gray);margin-bottom:16px">
    งบกระแสเงินสด (วิธีทางอ้อม) — คำนวณจากการเปลี่ยนแปลงระหว่างปีฐาน → ร่างปรับใหม่
  </div>

  <div class="sp">
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">รายการปรับปรุง (กรอกเอง)</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;max-width:700px">
      <div class="fg">
        <label class="fl">ค่าเสื่อมราคาปีนี้ (บวกกลับ)</label>
        <input type="number" class="fc" id="cf-depreciation" step="0.01" value="${n(cf.depreciation)}"
          onchange="onCFChange('depreciation',this.value)">
      </div>
      <div class="fg">
        <label class="fl">เงินปันผลจ่าย</label>
        <input type="number" class="fc" id="cf-dividends" step="0.01" value="${n(cf.dividends)}"
          onchange="onCFChange('dividends',this.value)">
      </div>
      <div class="fg">
        <label class="fl">ดอกเบี้ยจ่ายจริง (Cash)</label>
        <input type="number" class="fc" id="cf-interestPaid" step="0.01" value="${n(cf.interestPaid)}"

// ===== FULL STATEMENT TAB =====
function renderFullStatementTab(yd){
  const fd=Object.assign(defaultFullData(),yd.fullData||{});
  const base=Object.assign(defaultBase(),yd.base||{});
  const bRes=computeBase(base);
  const co=getCompany(S.currentCo);
  const hasImport=fd.importedAt>0;
  const importChip=hasImport
    ?`<div class="import-chip">✓ นำเข้าจาก PDF เมื่อ ${new Date(fd.importedAt).toLocaleDateString('th-TH')}</div>`:'';

  // -- Profit Target Engine compute --
  const tgt=fd.target||{enabled:false,mode:'growth',growthPct:10,targetNetIncome:0};
  let tgtResult=null;
  if(bRes.pl.totalRev>0){
    tgtResult=computeTarget(base,tgt,bRes);
  }

  // -- PPE detail table --
  const ppeRows=(fd.bsDetail.ppeDetail||[]);
  const ppeTotCost=ppeRows.reduce((s,r)=>s+n(r.cost),0);
  const ppeTotDep=ppeRows.reduce((s,r)=>s+n(r.accDep),0);
  const ppeTotNet=ppeRows.reduce((s,r)=>s+n(r.cost)-n(r.accDep),0);
  const ppeTotDepYr=ppeRows.reduce((s,r)=>s+n(r.depYear),0);
  const ppeBaseSync=ppeTotNet>0&&Math.abs(ppeTotNet-n(base.ppe))<1;
  const ppeHtml=ppeRows.length?`
    <div style="overflow-x:auto">
    ${ppeTotNet>0?`<div style="font-size:11px;margin-bottom:4px;color:${ppeBaseSync?'var(--green)':'var(--amber)'}">
      ${ppeBaseSync?'✓ sync กับงบดุล (ppe = '+fmt(n(base.ppe))+')':'⚠ ppe ในงบดุล: '+fmt(n(base.ppe))+' | รวม PPE detail: '+fmt(ppeTotNet)+' — บันทึกเพื่อ sync'}
    </div>`:''}
    <table class="det-tbl">
      <thead><tr><th>รายการ</th><th>ราคาทุน</th><th>ค่าเสื่อมสะสม</th><th>มูลค่าสุทธิ</th><th>อัตรา%</th><th>ค่าเสื่อมปีนี้</th><th></th></tr></thead>
      <tbody>
      ${ppeRows.map((r,i)=>{const net=n(r.cost)-n(r.accDep);return`<tr>
        <td>${esc(r.name||'')}</td><td>${fmt(n(r.cost))}</td><td>${fmt(n(r.accDep))}</td>
        <td>${fmt(net)}</td><td>${n(r.depRate)||0}%</td><td>${fmt(n(r.depYear))}</td>
        <td><button class="btn btn-xs btn-danger" onclick="deletePPEFullRow(${i})">✕</button></td>
      </tr>`}).join('')}
      <tr class="dt-sub"><td>รวม</td>
        <td>${fmt(ppeTotCost)}</td>
        <td>${fmt(ppeTotDep)}</td>
        <td>${fmt(ppeTotNet)}</td>
        <td></td><td>${fmt(ppeTotDepYr)}</td><td></td>
      </tr>
      </tbody>
    </table></div>`
    :`<div style="text-align:center;padding:10px;color:var(--gray);font-size:12px">ยังไม่มีข้อมูล PPE — นำเข้าจาก PDF หรือกรอกในแท็บ D</div>`;

  // -- Tax computation table (full per Thai notes) --
  const pd=fd.plDetail;
  const taxableBase=n(pd.taxAccountingProfit)||bRes.pl.pbt;
  const taxableAfterAddback=taxableBase+n(pd.taxAddBack)-n(pd.taxDeduct);
  const taxableAfterLoss=taxableAfterAddback-n(pd.taxLossCarryforward);
  const taxableIncomeFinal=n(pd.taxableIncome)||taxableAfterLoss;
  const totalTax=(n(pd.currentTax)||bRes.pl.tax)+n(pd.deferredTax);
  const taxPayableFinal=totalTax-n(pd.taxWHTPaid)-n(pd.taxPrepaid);
  const taxHtml=`
    <div style="overflow-x:auto">
    <table class="det-tbl"><tbody>
      <tr><td>กำไร(ขาดทุน)สุทธิตามบัญชี</td><td style="text-align:right;font-family:Courier New">${fmt(taxableBase)}</td></tr>
      <tr><td style="padding-left:16px">บวก รายจ่ายต้องห้าม</td><td style="text-align:right;font-family:Courier New">${fmt(n(pd.taxAddBack))}</td></tr>
      <tr><td style="padding-left:16px">หัก รายการที่หักออก</td><td style="text-align:right;font-family:Courier New">(${fmt(n(pd.taxDeduct))})</td></tr>

      <tr><td style="padding-left:16px">อัตราภาษีนิติบุคคล

    </tbody></table></div>`;

  // -- Admin expense breakdown --
  function niAdmin(field){

    ['adminSalaries','เงินเดือนพนักงาน'],

function computeTarget(base,tgt,bRes){
  const br=bRes||computeBase(base);
  const baseNI=br.pl.netIncome;
  const baseRev=br.pl.totalRev;
  if(baseRev<=0)return null;

  let targetNI;
  if(tgt.mode==='fixed'){
    targetNI=n(tgt.targetNetIncome);
  }else{
    targetNI=baseNI*(1+(n(tgt.growthPct)||10)/100);
  }

  const cogsRate=n(base.cogs)/baseRev;
  const sellingRate=n(base.sellingExp)/baseRev;
  const adminRate=n(base.admin)/baseRev;
  const depRate=n(base.depExp)/baseRev;
  const intRate=n(base.interestExp)/baseRev;
  const taxRate=br.pl.pbt>0?br.pl.tax/br.pl.pbt:0.20;
  const netMarginRate=baseNI/baseRev;

  const targetRev=netMarginRate!==0?targetNI/netMarginRate:baseRev;
  const targetCogs=targetRev*cogsRate;
  const targetSelling=targetRev*sellingRate;
  const targetAdmin=targetRev*adminRate;
  const targetDep=targetRev*depRate;
  const targetInterest=targetRev*intRate;
  const targetGP=targetRev-targetCogs;
  const targetEBIT=targetGP-targetSelling-targetAdmin-targetDep;
  const targetPBT=targetEBIT-targetInterest;
  const targetTax=Math.max(0,targetPBT*taxRate);
  const targetNICalc=targetPBT-targetTax;
  const targetREEnd=n(base.reBegin)+targetNICalc;
  const targetEquity=n(base.capital)+targetREEnd;

  // BS computation: equity delta drives cash auto-balance
  const baseTotal=br.bs.totalAssets;
  const baseEquity=br.bs.totalEquity;
  const equityDelta=targetEquity-baseEquity;
  const newCash=n(base.cash)+equityDelta;
  const newTotalAssets=baseTotal+equityDelta;

  return{targetRev,targetCogs,targetSelling,targetAdmin,targetDep,targetInterest,
    targetGP,targetEBIT,targetPBT,targetTax,targetNI:targetNICalc,
    targetREEnd,targetEquity,
    bsCash:newCash,bsTotalAssets:newTotalAssets,bsEquityDelta:equityDelta};
}

function collectDraftInputs(yd){
  const fields=['rev','otherRev','cogs','admin','depExp','interestExp',
    'ar','loanAr','inventory','oca','deposit','ppe','intangible',
    'ap','shortLoan','longLoan','taxPay','ocl','longLoanNC','directorLoan',
    'capital','reBegin','cash'];
  if(!yd.draft)yd.draft=defaultDraft();
  fields.forEach(f=>{
    const el=document.getElementById(`di-${f}`);

function updateCalcCells(yd){
  const settings=Object.assign(defaultSettings(),yd.settings||{});
  const draft=Object.assign(defaultDraft(),yd.draft||{});
  const res=compute(draft,settings);
  const pl=res.pl;const bs=res.bs;const kpi=res.kpi;const d=res.d;
  const mode=settings.taxMode||'auto';

  function setCV(id,val,neg=false){
    const el=document.getElementById(id);
    if(!el)return;
    el.className='cv'+(neg&&val<0?' neg':'');
    el.textContent=fmt(val);
  }
  if(mode==='target-rev'){const el=document.getElementById('di-rev');if(el)el.value=d.rev.toFixed(2);}
  else if(mode==='target-cogs'){const el=document.getElementById('di-cogs');if(el)el.value=d.cogs.toFixed(2);}
  if(settings.cashAutoBalance){const el=document.getElementById('cv-cash');if(el)el.textContent=fmt(bs.cash);}
  // Update row highlight dynamically
  const base4hl=Object.assign(defaultBase(),(getYearData(S.currentCo,S.currentYear)||{}).base||{});
  updateBSHighlight(bs,draft,base4hl);

  // P&L
  setCV('cv-totalRev',pl.totalRev);
  setCV('cv-grossProfit',pl.grossProfit);
  setCV('cv-ebit',pl.ebit);
  setCV('cv-pbt',pl.pbt);
  setCV('cv-tax',pl.tax);
  setCV('cv-netIncome',pl.netIncome,true);
  // BS Assets
  setCV('cv-curAssets',bs.currentAssets);
  setCV('cv-ncAssets',bs.nonCurrentAssets);
  setCV('cv-totAssets',bs.totalAssets);
  // BS Liab
  setCV('cv-curLiab',bs.currentLiab);
  setCV('cv-ncLiab',bs.nonCurrentLiab);
  setCV('cv-totLiab',bs.totalLiab);
  // BS Equity
  setCV('cv-netIncome2',pl.netIncome,true);
  setCV('cv-reEnd',bs.reEnd);
  setCV('cv-totEquity',bs.totalEquity);
  setCV('cv-totLiabEq',bs.totalLiabEq);

  const diffEl=document.getElementById('cv-diff');
  if(diffEl){
    diffEl.innerHTML=Math.abs(bs.diff)<1
      ?`<span class="diff-ok">✓ ดุล (${fmt(bs.diff)})</span>`
      :`<span class="diff-err">⚠ ไม่ดุล (${fmt(bs.diff)})</span>`;
  }

  function setKPI(id,val,unit,cls){
    const el=document.getElementById(id);const box=document.getElementById(id+'-box');
    if(el)el.textContent=val+unit;if(box)box.className='kpi '+cls;
  }
  setKPI('cv-kpi-gm',fmtPct(kpi.grossMargin),'',kpi.grossMargin>=20?'pos':kpi.grossMargin>=0?'':'neg');
  setKPI('cv-kpi-em',fmtPct(kpi.ebitMargin),'',kpi.ebitMargin>=10?'pos':kpi.ebitMargin>=0?'':'neg');
  setKPI('cv-kpi-nm',fmtPct(kpi.netMargin),'',kpi.netMargin>=5?'pos':kpi.netMargin>=0?'':'neg');
  setKPI('cv-kpi-de',isFinite(kpi.de)?kpi.de.toFixed(2):'-',' เท่า',kpi.de<1?'pos':kpi.de<2?'warn':'neg');
  setKPI('cv-kpi-dr',isFinite(kpi.debtRatio)?(kpi.debtRatio*100).toFixed(1)+'%':'','',kpi.debtRatio<0.5?'pos':kpi.debtRatio<0.7?'warn':'neg');
  setKPI('cv-kpi-cr',isFinite(kpi.currentRatio)?kpi.currentRatio.toFixed(2):'-',' เท่า',kpi.currentRatio>=2?'pos':kpi.currentRatio>=1?'warn':'neg');
  setKPI('cv-kpi-ic',kpi.interestCoverage!==null?kpi.interestCoverage.toFixed(1):'-',' เท่า',kpi.interestCoverage===null?'':kpi.interestCoverage>=3?'pos':kpi.interestCoverage>=1.5?'warn':'neg');
}

function updateBSHighlight(bs,draft,base){
  const diff=Math.abs(bs.diff||0);
  const isUnbal=diff>=1;
  // fields: [draftField, baseField, cssId-prefix, condition]
  const fields=[
    ['cash',null,!isUnbal||n(draft.cash)!==0||n(base.cash)===0],
    ['ar',null,!isUnbal||n(draft.ar)!==0||n(base.ar)===0],
    ['loanAr',null,!isUnbal||n(draft.loanAr)!==0||n(base.loanAr)===0],
    ['inventory',null,!isUnbal||n(draft.inventory)!==0||n(base.inventory)===0],
    ['oca',null,!isUnbal||n(draft.oca)!==0||n(base.oca)===0],
    ['deposit',null,!isUnbal||n(draft.deposit)!==0||n(base.deposit)===0],
    ['ppe',null,!isUnbal||n(draft.ppe)!==0||n(base.ppe)===0],
    ['intangible',null,!isUnbal||n(draft.intangible)!==0||n(base.intangible)===0],
    ['ap',null,!isUnbal||n(draft.ap)!==0||n(base.ap)===0],
    ['shortLoan',null,!isUnbal||n(draft.shortLoan)!==0||n(base.shortLoan)===0],
    ['longLoan',null,!isUnbal||n(draft.longLoan)!==0||n(base.longLoan)===0],
    ['taxPay',null,!isUnbal||n(draft.taxPay)!==0||n(base.taxPay)===0],
    ['ocl',null,!isUnbal||n(draft.ocl)!==0||n(base.ocl)===0],
    ['longLoanNC',null,!isUnbal||n(draft.longLoanNC)!==0||n(base.longLoanNC)===0],
    ['directorLoan',null,!isUnbal||n(draft.directorLoan)!==0||n(base.directorLoan)===0],
    ['capital',null,!isUnbal||n(draft.capital)!==0],
    ['reBegin',null,!isUnbal||n(draft.reBegin)!==0||n(base.reBegin)===0],
  ];
  fields.forEach(([field,,ok])=>{
    const el=document.getElementById('di-'+field);
    if(!el)return;
    const row=el.closest('tr');
    if(!row)return;
    if(!ok){row.classList.add('bs-miss');}
    else{row.classList.remove('bs-miss');}
  });
  // Update banner
  const bsCard=document.querySelector('[id="cv-diff"]')?.closest('.card');
  if(bsCard){
    let banner=bsCard.querySelector('.bs-unbal-banner');
    if(isUnbal){
      if(!banner){
        banner=document.createElement('div');
        banner.className='bs-unbal-banner';
        banner.style.cssText='background:#FFF7ED;border-bottom:1px solid #FED7AA;padding:8px 14px;font-size:11px;color:#92400E';
        bsCard.querySelector('table')?.before(banner);
      }
      banner.innerHTML=`💡 <b>สินทรัพย์</b> ${fmt(bs.totalAssets)} &nbsp;vs&nbsp; <b>หนี้สิน+ทุน</b> ${fmt(bs.totalLiabEq)} &nbsp;ต่าง <b style="color:#DC2626">${fmt(bs.diff)}</b> — แถวสีแดง = ยังไม่ได้กรอก`;
      const titleDiv=bsCard.querySelector('div:first-child');
      if(titleDiv){
        let chip=titleDiv.querySelector('.bs-status-chip');
        if(!chip){chip=document.createElement('span');chip.className='bs-status-chip';titleDiv.appendChild(chip);}
        chip.style.cssText='font-size:11px;font-weight:600;background:#FEE2E2;color:#991B1B;padding:2px 10px;border-radius:20px;margin-left:8px';
        chip.textContent='⚠ ไม่ดุล '+fmtNum(bs.diff)+' บาท';
      }
    }else{
      if(banner)banner.remove();
      const chip=bsCard.querySelector('.bs-status-chip');
      if(chip){chip.style.cssText='font-size:11px;font-weight:600;background:#DCFCE7;color:#166534;padding:2px 10px;border-radius:20px;margin-left:8px';chip.textContent='✓ ดุล';}
    }
  }
}

  if(el){
    el.innerHTML=lcRes
      ?`วงเงินกู้ที่แนะนำ: <b style="font-size:18px;color:var(--navy)">${fmtNum(lcRes.loanCapacity)}</b> บาท

function applyRatioSuggestions(){
  if(!confirm('ต้องการให้ระบบปรับตัวเลขอัตโนมัติตามคำแนะนำ?\n\n• แปลงเงินกู้กรรมการเป็นทุน (ถ้า D/E > 2)\n• ปรับอัตราภาษีเป็น 20% (ถ้าภาษีต่ำเกินไป)\n\n(Draft ปัจจุบันจะถูกปรับ — แนะนำบันทึก Scenario ก่อน)'))return;
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd)return;
  if(!yd.draft)yd.draft=defaultDraft();
  if(!yd.settings)yd.settings=defaultSettings();
  const settings=Object.assign(defaultSettings(),yd.settings);
  const res=compute(Object.assign(defaultDraft(),yd.draft),settings);
  const kpi=res.kpi;
  let changed=false;
  if(kpi.de>2&&n(yd.draft.directorLoan)>0){
    const conv=yd.draft.directorLoan;
    yd.draft.directorLoan=0;
    yd.draft.capital=n(yd.draft.capital)+conv;
    toast(`แปลงเงินกู้กรรมการ ${fmtNum(conv)} บาท เป็นทุนแล้ว`,'ok');
    changed=true;
  }
  if(res.pl.pbt>0&&res.pl.tax/res.pl.pbt<0.10&&settings.taxMode==='auto'){
    yd.settings.taxRate=0.20;
    toast('ปรับอัตราภาษีเป็น 20% แล้ว','ok');
    changed=true;
  }
  if(!changed){toast('ไม่มีรายการที่ระบบแนะนำให้ปรับ','warn');return;}
  yd.updatedAt=Date.now();
  saveYearLocal(S.currentCo,S.currentYear,yd);
  fbSaveYear(S.currentCo,S.currentYear,yd);
  render();
}

let _aiFileData=null;
let _aiFileType=null;

function switchAITab(tab){
  document.getElementById('ai-tab-file').style.display=tab==='file'?'':'none';
  document.getElementById('ai-tab-text').style.display=tab==='text'?'':'none';
  document.getElementById('tab-btn-file').style.cssText=tab==='file'?'border-bottom:2px solid var(--blue);color:var(--blue)':'';
  document.getElementById('tab-btn-text').style.cssText=tab==='text'?'border-bottom:2px solid var(--blue);color:var(--blue)':'';
}

function handleAIFileDrop(e){
  e.preventDefault();
  document.getElementById('ai-drop-zone').style.borderColor='var(--border)';
  const file=e.dataTransfer.files[0];
  if(file)loadAIFile(file);
}
function handleAIFileSelect(input){
  const file=input.files[0];
  if(file)loadAIFile(file);
}
function loadAIFile(file){
  const maxMB=4.5;
  if(file.size>maxMB*1024*1024){toast(`ไฟล์ใหญ่เกิน ${maxMB}MB กรุณาลดขนาดก่อน`,'err');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result.split(',')[1];
    _aiFileData=b64;
    _aiFileType=file.type||'application/pdf';
    const prev=document.getElementById('ai-file-preview');
    document.getElementById('ai-file-name').textContent=file.name;
    document.getElementById('ai-file-size').textContent=(file.size/1024).toFixed(1)+' KB';
    document.getElementById('ai-file-icon').textContent=file.type.startsWith('image')?'🖼️':'📄';
    prev.style.display='';
  };
  reader.readAsDataURL(file);
}
function clearAIFile(){
  _aiFileData=null;_aiFileType=null;
  document.getElementById('ai-file-preview').style.display='none';
  document.getElementById('ai-file-input').value='';
}

function saveApiKey(){
  const k=(document.getElementById('ai-key-input')?.value||'').trim();
  if(k){localStorage.setItem('claude_api_key',k);toast('บันทึก API Key แล้ว','ok');}
}

async function runAIImport(){
  const apiKey=localStorage.getItem('claude_api_key');
  if(!apiKey){toast('กรุณาตั้งค่า Claude API Key ก่อน','warn');return;}

  const tabFile=document.getElementById('ai-tab-file');
  const useFile=tabFile&&tabFile.style.display!=='none';

  const prompt=`คุณเป็นนักบัญชีผู้เชี่ยวชาญ TFRS for NPAEs
สกัดตัวเลขจากงบการเงินนี้ ตอบเฉพาะ JSON เท่านั้น ห้ามมีข้อความอื่น

กฎสำคัญ:
- ตัวเลขในวงเล็บ เช่น (6,040,349.12) = ติดลบ → ใส่เป็น -6040349.12
- reBegin = กำไร(ขาดทุน)สะสม ณ ต้นปี (ยอดเปิด = ยอดปิดปีก่อน) ถ้าขาดทุนสะสม = ค่าลบ
- longLoanNC = เงินกู้ยืมระยะยาว ส่วนที่เกิน 1 ปี (ไม่ใช่ส่วนกรรมการ เว้นแต่ระบุชัด)
- directorLoan = เงินกู้กรรมการ/ผู้ถือหุ้น (ถ้าไม่มีให้ใส่ 0)
- taxPay = ภาษีเงินได้นิติบุคคลค้างจ่าย (CIT payable เท่านั้น)
- ocl = หนี้สินหมุนเวียนอื่นรวม เช่น ภาษีหัก ณ ที่จ่ายค้างจ่าย+ภาษีขาย+VAT รวมกัน
- ap = เจ้าหนี้การค้าและเจ้าหนี้อื่น รวมกัน
- capital = ทุนที่ออกและเรียกชำระแล้ว
- netIncome = กำไรสุทธิปีปัจจุบัน (ถ้าขาดทุน = ค่าลบ)
- ตัวเลขทุกตัวไม่ต้องใส่ comma หน่วย: บาท

{"rev":0,"otherRev":0,"cogs":0,"sellingExp":0,"admin":0,"depExp":0,"interestExp":0,"tax":0,"netIncome":0,"cash":0,"ar":0,"loanAr":0,"inventory":0,"oca":0,"deposit":0,"ppe":0,"intangible":0,"ap":0,"shortLoan":0,"longLoan":0,"taxPay":0,"ocl":0,"longLoanNC":0,"directorLoan":0,"capital":0,"reBegin":0}`;

  let msgContent;
  if(useFile&&_aiFileData){
    const isImg=(_aiFileType||'').startsWith('image');
    if(isImg){
      msgContent=[
        {type:'image',source:{type:'base64',media_type:_aiFileType,data:_aiFileData}},
        {type:'text',text:prompt}
      ];
    }else{
      // PDF
      msgContent=[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:_aiFileData}},
        {type:'text',text:prompt}
      ];
    }
  }else{
    const text=document.getElementById('ai-text')?.value||'';
    if(!text.trim()){toast('กรุณาวางข้อความหรืออัปโหลดไฟล์ก่อน','warn');return;}
    msgContent=[{type:'text',text:prompt+'\n\nข้อมูลงบการเงิน:\n'+text}];
  }

  // Show progress
  const progEl=document.getElementById('ai-progress');
  const runBtn=document.getElementById('ai-run-btn');
  if(progEl)progEl.style.display='';
  if(runBtn){runBtn.disabled=true;runBtn.textContent='กำลังวิเคราะห์...';}

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        messages:[{role:'user',content:msgContent}]
      })
    });
    const data=await resp.json();
    if(data.error){toast('API Error: '+data.error.message,'err');return;}
    const txt=data.content?.[0]?.text||'';
    const m=txt.match(/\{[\s\S]*\}/);
    if(!m){toast('AI ไม่สามารถแยกตัวเลขได้ — ลองตรวจสอบคุณภาพไฟล์','err');console.log('AI raw:',txt);return;}
    autoMatch(JSON.parse(m[0]));
    closeModal();
    toast('นำเข้าสำเร็จ ✓ — กรุณาตรวจสอบและบันทึก','ok');
  }catch(e){
    toast('เกิดข้อผิดพลาด: '+e.message,'err');
    console.error(e);

// ===== SYNC fullData → base/draft =====
// Pushes detail totals back so the main financials stay consistent
function syncFullDataToFinancials(yd){
  if(!yd||!yd.fullData)return;
  const fd=yd.fullData;
  const bd=fd.bsDetail||{};
  const pd=fd.plDetail||{};
  const eq=fd.equityChanges||{};
  if(!yd.base)yd.base=defaultBase();

  // 1. Cash: sum of detail components → base.cash
  const cashSum=n(bd.cashOnHand)+n(bd.cashAtBank)+n(bd.cashFixed);
  if(cashSum>0)yd.base.cash=cashSum;

  // 2. Admin expense: prefer adminLines (from PDF) sum; fallback to fixed fields
  const adminLinesArr=pd.adminLines||[];
  const adminLinesSum=adminLinesArr.reduce((s,r)=>s+n(r.amount),0);
  const adminFixedSum=n(pd.adminSalaries)+n(pd.adminSocialSec)+n(pd.adminWorkersComp)+
    n(pd.adminProvidentFund)+n(pd.adminWelfare)+n(pd.adminDep)+n(pd.adminUtilities)+
    n(pd.adminInternet)+n(pd.adminRent)+n(pd.adminPostage)+n(pd.adminSupplies)+
    n(pd.adminStationery)+n(pd.adminOfficeExp)+n(pd.adminRepairs)+n(pd.adminVehicle)+
    n(pd.adminTransport)+n(pd.adminFood)+n(pd.adminProfFees)+n(pd.adminAdvertising)+
    n(pd.adminDonation)+n(pd.adminBankFee)+n(pd.adminOtherFee)+n(pd.adminTaxNA)+
    n(pd.adminFineExp)+n(pd.adminBadDebt)+n(pd.adminInsurance)+n(pd.adminOther);
  const adminSum=adminLinesSum>0?adminLinesSum:adminFixedSum;
  if(adminSum>0)yd.base.admin=adminSum;

  // 2b. Selling expenses → base.sellingExp
  if(n(pd.sellingExpenses)>0)yd.base.sellingExp=n(pd.sellingExpenses);

  // 3. PPE net: sum net book from ppeDetail → base.ppe
  const ppeRows=bd.ppeDetail||[];
  if(ppeRows.length>0){
    const ppeNet=ppeRows.reduce((s,r)=>s+n(r.cost)-n(r.accDep),0);
    if(ppeNet>0)yd.base.ppe=ppeNet;
    // Also push depYear total → base.depExp if not already set
    const depYearSum=ppeRows.reduce((s,r)=>s+n(r.depYear),0);
    if(depYearSum>0&&n(yd.base.depExp)===0)yd.base.depExp=depYearSum;
  }

  // 4. Tax: currentTax → base.tax
  const totalTax=n(pd.currentTax)+n(pd.deferredTax);
  if(totalTax>0)yd.base.tax=totalTax;

  // 5. Equity opening → base.capital / base.reBegin
  if(n(eq.openCapital)>0)yd.base.capital=n(eq.openCapital);
  if(n(eq.openRE)!==0)yd.base.reBegin=n(eq.openRE);

  // 6. Equity closing → netIncome (for validation)
  if(n(eq.netIncome)>0&&n(yd.base.netIncome)===0)yd.base.netIncome=n(eq.netIncome);

  // 7. Trade AR net → base.ar
  const arNet=n(bd.tradeARGross)-n(bd.tradeARAllowance);
  if(arNet>0)yd.base.ar=arNet;

  // 8. WHT receivable + VAT receivable → base.oca (if base.oca is 0)
  const extraOCA=n(bd.whtReceivable)+n(bd.vatReceivable)+n(bd.advancePayments)+n(bd.prepaid);
  if(extraOCA>0&&n(yd.base.oca)===0)yd.base.oca=extraOCA;

  // 9. Extra current liabilities → base.ocl
  const extraOCL=n(bd.outputVAT)+n(bd.whtPayable)+n(bd.vatPayable)+
    n(bd.advanceReceipts)+n(bd.dividendsPayable)+n(bd.accruedSalaries)+
    n(bd.accruedExpenses)+n(bd.otherAccrued);
  if(extraOCL>0&&n(yd.base.ocl)===0)yd.base.ocl=extraOCL;

  // 10. Provision for EOD → base.longLoanNC supplement (non-current)
  // (keep separate — don't overwrite, just note)

  yd.updatedAt=Date.now();
  return yd;
}

    [['ซ่อมแซม','บำรุงรักษา','repair'],'adminRepairs'],

    [['อาหาร','เครื่องดื่ม','food'],'adminFood'],
    [['เสื่อมราคา','depreciation','dep'],'adminDep'],
    [['ตรวจสอบบัญชี','สอบบัญชี','ที่ปรึกษา','audit','professional'],'adminProfFees'],
    [['โฆษณา','ประชาสัมพันธ์','advertising'],'adminAdvertising'],
    [['บริจาค','donation'],'adminDonation'],
    [['ธรรมเนียมธนาคาร','bank fee','bank charge'],'adminBankFee'],
    [['ธรรมเนียมอื่น','other fee'],'adminOtherFee'],
    [['ภาษีซื้อไม่ขอคืน','vat not claim','ภาษีมูลค่าเพิ่มต้องห้าม'],'adminTaxNA'],
    [['ต้องห้าม','fine','penalty'],'adminFineExp'],
    [['หนี้สูญ','สงสัยจะสูญ','bad debt'],'adminBadDebt'],
    [['ประกันภัย','insurance'],'adminInsurance'],
  ];
  // Reset all fixed fields first
  map.forEach(([,f])=>{pd[f]=0;});
  pd.adminOther=0;
  const unmapped=[];

        pd[field]=(pd[field]||0)+n(line.amount);

    }
    if(!matched)unmapped.push(line);
  });
  if(unmapped.length>0){

function cloneYearAsNew(cId,fromYr,toYr){
  if(getYearData(cId,toYr)){
    if(!confirm(`ปี ${toYr} มีอยู่แล้ว ต้องการเขียนทับหรือไม่?`))return;
  }
  const src=getYearData(cId,fromYr);
  if(!src){toast('ไม่พบข้อมูล','err');return;}
  syncFullDataToFinancials(src);// sync before reading values
  const newBase=Object.assign({},src.draft||src.base||{});
  // Forward RE: reBegin of new year = reEnd of current year
  const bRes=computeBase(Object.assign(defaultBase(),src.base||{}));
  const dRes=compute(Object.assign(defaultDraft(),src.draft||{}),Object.assign(defaultSettings(),src.settings||{}));
  newBase.reBegin=dRes.bs.reEnd;
  // Build fullData: copy from source and update equity opening balances
  const srcFD=src.fullData||defaultFullData();
  const newFD=Object.assign(defaultFullData(),JSON.parse(JSON.stringify(srcFD)),{importedFrom:'cloned',importedAt:Date.now()});
  // Opening balances of new year = closing balances of source year
  newFD.equityChanges.openCapital=n(srcFD.equityChanges?.closeCapital)||n(src.base?.capital)||0;
  newFD.equityChanges.openRE=n(srcFD.equityChanges?.closeRE)||bRes.bs.reEnd||0;
  newFD.equityChanges.openTotal=n(srcFD.equityChanges?.closeTotal)||bRes.bs.totalEquity||0;
  // Clear closing balances — will be filled by new year
  newFD.equityChanges.netIncome=0;
  newFD.equityChanges.closeCapital=0;
  newFD.equityChanges.closeRE=0;
  newFD.equityChanges.closeTotal=0;
  const newData={
    year:toYr,status:'draft',
    base:newBase,
    draft:defaultDraft(),
    settings:Object.assign({},src.settings||defaultSettings()),
    cf:defaultCF(),notes:defaultNotes(),
    bankAnalysis:defaultBankAnalysis(),scenarios:defaultScenarios(),
    reportSettings:defaultReportSettings(),
    fullData:newFD,
    updatedAt:Date.now()
  };
  saveYearLocal(cId,toYr,newData);
  fbSaveYear(cId,toYr,newData);
  toast(`สร้างปี ${toYr} จากโครงสร้างปี ${fromYr} แล้ว — กำไรสะสมต้นปีอัปเดตอัตโนมัติ`,'ok');
  S.currentYear=toYr;S.editorTab='base';render();
}

function loadFAIFile(file){
  if(file.size>4.5*1024*1024){toast('ไฟล์ใหญ่เกิน 4.5MB','err');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    _faiFileData=e.target.result.split(',')[1];
    _faiFileType=file.type||'application/pdf';
    document.getElementById('fai-fname').textContent=file.name;
    document.getElementById('fai-fsize').textContent=(file.size/1024).toFixed(1)+' KB';
    document.getElementById('fai-icon').textContent=file.type.startsWith('image')?'🖼️':'📄';
    document.getElementById('fai-preview').style.display='';
  };
  reader.readAsDataURL(file);
}

function applyFullImport(parsed){
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd)return;
  // Apply base
  if(parsed.base){
    if(!yd.base)yd.base=defaultBase();
    Object.keys(parsed.base).forEach(k=>{
      if(parsed.base[k]!==undefined)yd.base[k]=parseAccountingNumber(parsed.base[k]);
    });
  }
  // Apply fullData
  if(!yd.fullData)yd.fullData=defaultFullData();
  if(parsed.fullData){
    const fd=parsed.fullData;
    if(fd.bsDetail)Object.keys(fd.bsDetail).forEach(k=>{
      if(k==='ppeDetail'&&Array.isArray(fd.bsDetail.ppeDetail)){
        yd.fullData.bsDetail.ppeDetail=fd.bsDetail.ppeDetail.filter(r=>r.name||r.cost).map(r=>({
          name:r.name||'',
          cost:parseAccountingNumber(r.cost),
          accDep:parseAccountingNumber(r.accDep),
          depRate:parseAccountingNumber(r.depRate),
          depYear:parseAccountingNumber(r.depYear)
        }));
      }else if(fd.bsDetail[k]!==undefined){
        yd.fullData.bsDetail[k]=parseAccountingNumber(fd.bsDetail[k]);
      }
    });
    if(fd.plDetail)Object.keys(fd.plDetail).forEach(k=>{
      if(k==='adminLines'&&Array.isArray(fd.plDetail.adminLines)){
        yd.fullData.plDetail.adminLines=fd.plDetail.adminLines.filter(r=>r.label||r.amount).map(r=>({
          label:String(r.label||''),amount:parseAccountingNumber(r.amount)
        }));
      }else if(fd.plDetail[k]!==undefined){
        yd.fullData.plDetail[k]=k==='approvalNote'?String(fd.plDetail[k]||''):parseAccountingNumber(fd.plDetail[k]);
      }
    });
    if(fd.equityChanges)Object.keys(fd.equityChanges).forEach(k=>{
      if(fd.equityChanges[k]!==undefined)yd.fullData.equityChanges[k]=parseAccountingNumber(fd.equityChanges[k]);
    });
    if(fd.notesText)Object.assign(yd.fullData.notesText,fd.notesText);
  }
  yd.fullData.importedAt=Date.now();
  yd.fullData.importedFrom='pdf-ai';
  yd.updatedAt=Date.now();
  saveYearLocal(S.currentCo,S.currentYear,yd);
  fbSaveYear(S.currentCo,S.currentYear,yd);
  if(S.editorTab==='fullstat'){const el=document.getElementById('ed-tab-content');if(el)el.innerHTML=renderFullStatementTab(yd);}
  else if(S.editorTab==='base'){const el=document.getElementById('ed-tab-content');if(el)el.innerHTML=renderBaseTab(yd);}
  // Show validation modal
  setTimeout(()=>showImportValidationModal(parsed,yd),300);
}

  ];
  const rowsHtml=rows.map(r=>{

    return `<tr>

  // Retained earnings sign warning
  const warnings=[];

  }
  const warnHtml=warnings.length?`<div style="margin-top:12px;padding:10px 12px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;font-size:12px;color:#92400E">${warnings.join('<br>')}</div>`:'';

  showModal(`
  <div class="mh"><div class="mt">ตรวจสอบการนำเข้า</div><button class="mc" onclick="closeModal()">×</button></div>
  <p style="font-size:12px;color:var(--gray);margin-bottom:12px">เปรียบเทียบตัวเลขจาก PDF vs ข้อมูลในแอป · วงเล็บ = ค่าติดลบ</p>

// ===== FULL STATEMENT PDF EXPORT =====
async function exportFullStatementPDF(){
  const co=getCompany(S.currentCo);
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd){toast('ไม่มีข้อมูล','err');return;}
  syncFullDataToFinancials(yd);// sync detail → summary before export
  const fd=yd.fullData||defaultFullData();
  const base=Object.assign(defaultBase(),yd.base||{});
  const bRes=computeBase(base);
  const settings=Object.assign(defaultSettings(),yd.settings||{});
  const draft=Object.assign(defaultDraft(),yd.draft||{});
  const dRes=compute(draft,settings);
  const cf=Object.assign(defaultCF(),yd.cf||{});
  const cfRes=computeCF(base,draft,settings,cf,dRes);

  // Try server first, fallback to print
  const payload={
    company:co,year:S.currentYear,
    current:{draft:dRes.d,settings,pl:dRes.pl,bs:dRes.bs},
    base:{pl:bRes.pl,bs:bRes.bs,raw:base},
    cf:cfRes,fullData:fd,mode:'full'
  };
  toast('กำลังสร้าง Full Statement PDF...','');
  try{
    const resp=await fetch(PDF_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!resp.ok)throw new Error('server '+resp.status);
    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=`FullStatement_${co?.name||''}_${S.currentYear}.pdf`;a.click();
    URL.revokeObjectURL(url);
    toast('Export Full PDF แล้ว','ok');
  }catch(e){
    // Fallback: print window
    toast('Server ไม่ตอบ — เปิดหน้า Print แทน','warn');
    printFullStatement(co,yd,bRes,dRes,cfRes,fd);
  }
}

function fillFromPrevYear(){
  const prevYr=getPrevYear(S.currentCo,S.currentYear);
  if(!prevYr){toast('ไม่มีข้อมูลปีก่อนหน้า','warn');return;}
  const prevData=getYearData(S.currentCo,prevYr);
  if(!prevData){toast('ไม่พบข้อมูลปี '+prevYr,'warn');return;}
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd)return;
  // Copy prev year's base (or draft if no base) to current year's base
  const src=prevData.base||defaultBase();
  if(!yd.base)yd.base=defaultBase();
  Object.keys(src).forEach(k=>{yd.base[k]=src[k];});
  saveYearLocal(S.currentCo,S.currentYear,yd);
  toast(`ดึงข้อมูลปี ${prevYr} มาเป็นปีฐานแล้ว`,'ok');
  render();
}

function handleSaveYear(){
  const cId=document.getElementById('m-co-id')?.value;
  const yr=document.getElementById('m-year')?.value?.trim();
  const copyFrom=document.getElementById('m-copy-yr')?.value;
  if(!yr){toast('กรุณากรอกปี','err');return;}
  if(getYearData(cId,yr)){toast('ปี '+yr+' มีอยู่แล้ว','warn');return;}
  let newData={year:yr,status:'draft',base:defaultBase(),draft:defaultDraft(),settings:defaultSettings(),cf:defaultCF(),notes:defaultNotes(),bankAnalysis:defaultBankAnalysis(),scenarios:defaultScenarios(),reportSettings:defaultReportSettings(),updatedAt:Date.now()};
  if(copyFrom){
    const prev=getYearData(cId,copyFrom);
    if(prev){
      // Copy draft as new base, reset draft
      newData.base=Object.assign({},prev.draft||prev.base||{});
      // Also copy settings
      newData.settings=Object.assign({},prev.settings||defaultSettings());
    }
  }
  saveYearLocal(cId,yr,newData);
  fbSaveYear(cId,yr,newData);
  closeModal();
  toast('เพิ่มปี '+yr+' แล้ว','ok');
  if(S.view==='editor'&&S.currentCo===cId){
    S.currentYear=yr;S.editorTab='base';
  }
  render();
}
