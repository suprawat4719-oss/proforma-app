<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Forma — S.P.N. Corporate Services</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#1E3A5F;--blue:#2563EB;--blue-lt:#EFF6FF;
  --green:#16A34A;--green-lt:#DCFCE7;
  --red:#DC2626;--red-lt:#FEE2E2;
  --amber:#D97706;--amber-lt:#FEF3C7;
  --gray:#6B7280;--border:#E5E7EB;--bg:#F0F4F8;
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px rgba(0,0,0,.07);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1);
  --r:10px;--font:'Segoe UI',system-ui,sans-serif
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:#1F2937;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}

/* Nav */
.nav{background:var(--navy);padding:0 20px;height:56px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.nav-brand{flex:1}
.nav-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px}
.nav-sub{font-size:11px;color:#94A3B8}
.dot{width:8px;height:8px;border-radius:50%;background:#EF4444;flex-shrink:0;transition:background .3s}
.dot.on{background:#22C55E}
.dot-lbl{font-size:11px;color:#94A3B8}

/* Container */
.wrap{max-width:1200px;margin:0 auto;padding:20px}

/* Card */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:20px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:opacity .15s;white-space:nowrap}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue);color:#fff}
.btn-secondary{background:#F1F5F9;color:#334155;border:1px solid var(--border)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-amber{background:var(--amber);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}
.btn-xs{padding:3px 8px;font-size:11px;border-radius:5px}

/* Form */
.fg{margin-bottom:14px}
.fl{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
.fc{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font);color:#1F2937;background:#fff;transition:border-color .15s}
.fc:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
select.fc{cursor:pointer}

/* Toast */
#toast{position:fixed;top:64px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.ti{background:#1F2937;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;box-shadow:var(--shadow-lg);animation:tslide .2s ease;max-width:280px}
.ti.ok{background:var(--green)}.ti.err{background:var(--red)}.ti.warn{background:var(--amber)}
@keyframes tslide{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* Overlay / Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:mup .2s ease}
@keyframes mup{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mt{font-size:16px;font-weight:700;color:var(--navy)}
.mc{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);line-height:1;padding:2px 6px;border-radius:4px}
.mc:hover{background:#F1F5F9}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Dashboard */
.dash-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.dash-title{font-size:20px;font-weight:700;color:var(--navy)}
.grid-co{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.co-card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:18px;border:1px solid var(--border);transition:box-shadow .15s,transform .15s;cursor:default}
.co-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.co-name{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:2px}
.co-meta{font-size:12px;color:var(--gray);margin-bottom:12px;line-height:1.7}
.co-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ychips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.ychip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:opacity .15s}
.ychip:hover{opacity:.8}
.ychip.draft{background:var(--amber-lt);color:#92400E}
.ychip.final{background:var(--green-lt);color:#166534}
.ychip.none{background:#F1F5F9;color:#64748B}
.card-acts{display:flex;gap:4px}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--gray)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-txt{font-size:16px;font-weight:500;margin-bottom:6px}
.empty-sub{font-size:13px;margin-bottom:20px}

/* Breadcrumb */
.bc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--gray);margin-bottom:16px;flex-wrap:wrap}
.bc a{color:var(--blue);cursor:pointer;text-decoration:none}
.bc a:hover{text-decoration:underline}
.bc-sep{color:#CBD5E1}

/* Timeline */
.timeline{display:flex;align-items:stretch;overflow-x:auto;background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;padding:2px 0}
.ty{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 16px;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap;font-size:13px;color:var(--gray);flex-shrink:0}
.ty.active{border-bottom-color:var(--blue);color:var(--blue);font-weight:700}
.ty:hover:not(.active){background:#F8FAFC}
.ty-st{font-size:10px;padding:1px 6px;border-radius:10px}
.ty-st.draft{background:var(--amber-lt);color:#92400E}
.ty-st.final{background:var(--green-lt);color:#166534}
.ty-add{display:flex;align-items:center;padding:8px 12px}

/* Editor */
.ed-hdr{background:#fff;border-radius:var(--r);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.ed-co-name{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:2px}
.ed-co-meta{font-size:12px;color:var(--gray)}
.ed-tabs{display:flex;border-bottom:2px solid var(--border);background:#fff;border-radius:var(--r) var(--r) 0 0;padding:0 8px;margin-bottom:0;box-shadow:var(--shadow)}
.etab{padding:12px 20px;border:none;background:none;font-size:13px;font-weight:600;color:var(--gray);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;font-family:var(--font);transition:all .15s}
.etab.active{color:var(--blue);border-bottom-color:var(--blue)}

/* Financial table */
.ft{width:100%;border-collapse:collapse;font-size:13px}
.ft th{background:var(--navy);color:#fff;padding:10px 12px;text-align:right;font-weight:600;font-size:12px}
.ft th:first-child{text-align:left}
.ft td{padding:7px 12px;border-bottom:1px solid #F1F5F9;vertical-align:middle}
.ft tr:hover td{background:#FAFBFF}
.sh td{background:#F0F4F8;font-weight:700;font-size:12px;color:var(--navy);padding:7px 12px;letter-spacing:.3px;cursor:default}
.ft tr:hover.sh td{background:#F0F4F8}
.tr-total td{font-weight:700;border-top:2.5px solid #CBD5E1;border-bottom:2.5px solid #CBD5E1;background:#FAFBFF}
.tr-sub td{font-weight:600;border-top:1px solid var(--border)}
.ind td:first-child{padding-left:24px}
.num-r{text-align:right}
.ni{width:100%;text-align:right;border:1px solid transparent;border-radius:4px;padding:3px 6px;font-size:13px;font-family:var(--font);background:transparent;color:inherit;-moz-appearance:textfield}
.ni::-webkit-inner-spin-button,.ni::-webkit-outer-spin-button{-webkit-appearance:none}
.ni:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.ni:disabled{color:var(--blue);font-weight:600;cursor:default}
.cv{color:var(--blue);font-weight:600;text-align:right;display:block}
.cv.neg{color:var(--red)}
.diff-ok{color:var(--green);font-weight:700}
.diff-err{color:var(--red);font-weight:700}
.pct-ch{font-size:10px;color:var(--gray);margin-left:4px}
.pct-up{color:var(--green)}.pct-dn{color:var(--red)}

/* Settings */
.sp{background:#F8FAFC;border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;align-items:end}
.sl{font-size:11px;font-weight:600;color:var(--gray);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.4px}
.tog{position:relative;width:40px;height:22px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.tsl{position:absolute;inset:0;background:#CBD5E1;border-radius:22px;cursor:pointer;transition:.2s}
.tsl::before{content:'';position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked+.tsl{background:var(--blue)}
.tog input:checked+.tsl::before{transform:translateX(18px)}
.tog-row{display:flex;align-items:center;gap:8px;margin-top:2px}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border-radius:8px;border:1px solid var(--border);padding:12px 14px}
.kl{font-size:11px;color:var(--gray);margin-bottom:3px;font-weight:500}
.kv{font-size:20px;font-weight:700;color:var(--navy)}
.kpi.pos .kv{color:var(--green)}.kpi.neg .kv{color:var(--red)}
.kpi.warn .kv{color:var(--amber)}

/* Base form */
.bg2{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.bfield label{display:block;font-size:11px;font-weight:600;color:var(--gray);margin-bottom:4px}
.bfield input{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-size:13px;font-family:var(--font);text-align:right;color:#1F2937}
.bfield input:focus{outline:none;border-color:var(--blue)}

/* Sec title */
.stit{font-size:12px;font-weight:700;color:var(--navy);margin:16px 0 10px;padding-bottom:6px;border-bottom:2px solid #CBD5E1;text-transform:uppercase;letter-spacing:.5px}

/* Status badge */
.sbadge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.sbadge.draft{background:var(--amber-lt);color:#92400E}
.sbadge.final{background:var(--green-lt);color:#166534}

/* Export bar */
.xbar{display:flex;gap:8px;flex-wrap:wrap;padding:12px 0;border-top:1px solid var(--border);margin-top:8px}

/* Bank Analysis */
.score-ring{display:flex;flex-direction:column;align-items:center;justify-content:center;width:120px;height:120px;border-radius:50%;border:8px solid;font-family:var(--font);flex-shrink:0}
.score-ring.green{border-color:var(--green);color:var(--green)}
.score-ring.amber{border-color:var(--amber);color:var(--amber)}
.score-ring.red{border-color:var(--red);color:var(--red)}
.score-num{font-size:32px;font-weight:800;line-height:1}
.score-lbl{font-size:11px;font-weight:600;margin-top:2px}
.score-level{font-size:13px;font-weight:700;margin-top:4px}
.flag-tbl{width:100%;border-collapse:collapse;font-size:12px}
.flag-tbl th{background:#F0F4F8;padding:6px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--navy)}
.flag-tbl td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.flag-ok{color:var(--green);font-weight:600}
.flag-warn{color:var(--amber);font-weight:600}
.flag-critical{color:var(--red);font-weight:700}
.sc-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start}
.sc-name{font-weight:700;font-size:13px;color:var(--navy)}
.sc-meta{font-size:11px;color:var(--gray);margin-top:2px}

/* Notes table */
.notes-tbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}
.notes-tbl th{background:#F0F4F8;padding:6px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--navy);border-bottom:2px solid var(--border)}
.notes-tbl th.num-r{text-align:right}
.notes-tbl td{padding:5px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.notes-tbl tr:hover td{background:#FAFBFF}

/* Responsive */
@media(max-width:640px){
  .wrap{padding:12px}
  .grid-co{grid-template-columns:1fr}
  .sgrid{grid-template-columns:1fr 1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-title">AI Financial Statement Builder for Bank Loan</div>
    <div class="nav-sub">AI เครื่องมือช่วยจัดโครงสร้างงบเพื่อขอสินเชื่อ — S.P.N. Corporate Services</div>
  </div>
  <div class="dot" id="dot"></div>
  <div class="dot-lbl" id="dot-lbl">ออฟไลน์</div>
</nav>

<div id="toast"></div>

<div class="ov" id="ov">
  <div class="modal" id="modal"></div>
</div>

<div id="app"></div>

<script>
'use strict';
const BUILD_TIME = '2026-05-13T09:00:00';
const BUILD_LABEL = 'v3.0';

// ===== CONFIG =====
const FB_CFG = {
  apiKey:"AIzaSyDgjfoPXa9hWIypcUKsGq7-2EP5FvGB3iM",
  authDomain:"advance-tracker-cadf5.firebaseapp.com",
  projectId:"advance-tracker-cadf5",
  storageBucket:"advance-tracker-cadf5.firebasestorage.app",
  messagingSenderId:"186461314782",
  appId:"1:186461314782:web:552ad245c22d36a53cac4f"
};
const PDF_URL = 'http://localhost:5055/api/generate-pdf';

// ===== STATE =====
let db = null;
let S = {
  view: 'dashboard',       // 'dashboard' | 'editor'
  companies: [],           // [{id,name,taxId,address,director,businessType}]
  years: {},               // {companyId: {year: yearData}}
  currentCo: null,
  currentYear: null,
  editorTab: 'base',       // 'base' | 'draft'
  online: false
};

// ===== HELPERS =====
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function n(v){return v||0}

function fmt(v){
  if(v===null||v===undefined||v===''||v===0)return '-';
  if(!isFinite(v))return '-';
  const abs=Math.abs(v);
  const s=abs.toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});
  return v<0?`(${s})`:s;
}
function fmtNum(v){return (v||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtPct(v){return isFinite(v)?v.toFixed(2)+'%':'-'}
function fmtPctChg(draft,base){
  if(!base||base===0)return '';
  const pct=((draft-base)/Math.abs(base))*100;
  const cls=pct>=0?'pct-up':'pct-dn';
  const sign=pct>=0?'+':'';
  return `<span class="pct-ch ${cls}">${sign}${pct.toFixed(1)}%</span>`;
}

function thaiYear(y){return y}// already stored as พ.ศ.

// ===== TOAST =====
function toast(msg,type=''){
  const d=document.createElement('div');
  d.className='ti'+(type?' '+type:'');
  d.textContent=msg;
  document.getElementById('toast').appendChild(d);
  setTimeout(()=>d.remove(),3200);
}

// ===== MODAL =====
function showModal(html){
  document.getElementById('modal').innerHTML=html;
  document.getElementById('ov').classList.add('open');
}
function closeModal(){
  document.getElementById('ov').classList.remove('open');
  document.getElementById('modal').innerHTML='';
}
document.getElementById('ov').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});

// ===== LOCALSTORAGE =====
function lsGetCompanies(){try{return JSON.parse(localStorage.getItem('proforma_co_v1'))||[];}catch{return[];}}
function lsSaveCompanies(){localStorage.setItem('proforma_co_v1',JSON.stringify(S.companies));}
function lsGetYear(cId,yr){try{return JSON.parse(localStorage.getItem(`proforma_yr_v1_${cId}_${yr}`))||null;}catch{return null;}}
function lsSaveYear(cId,yr,data){localStorage.setItem(`proforma_yr_v1_${cId}_${yr}`,JSON.stringify(data));}
function lsGetAllYearKeys(cId){
  const keys=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(`proforma_yr_v1_${cId}_`))keys.push(k);
  }
  return keys;
}
function lsGetAllYears(cId){
  const yrs={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||!k.startsWith(`proforma_yr_v1_${cId}_`))continue;
    const yr=k.replace(`proforma_yr_v1_${cId}_`,'');
    try{yrs[yr]=JSON.parse(localStorage.getItem(k));}catch{}
  }
  return yrs;
}

// ===== DATA OPS =====
function getCompany(cId){return S.companies.find(c=>c.id===cId);}
function getYearData(cId,yr){
  if(!S.years[cId])return null;
  return S.years[cId][yr]||null;
}
function getAllYears(cId){
  if(!S.years[cId])return [];
  return Object.keys(S.years[cId]).sort((a,b)=>Number(a)-Number(b));
}
function getPrevYear(cId,yr){
  const yrs=getAllYears(cId);
  const idx=yrs.indexOf(String(yr));
  return idx>0?yrs[idx-1]:null;
}

function saveCompanyLocal(c){
  const idx=S.companies.findIndex(x=>x.id===c.id);
  if(idx>=0)S.companies[idx]=c;else S.companies.push(c);
  lsSaveCompanies();
}
function saveYearLocal(cId,yr,data){
  if(!S.years[cId])S.years[cId]={};
  S.years[cId][String(yr)]=data;
  lsSaveYear(cId,String(yr),data);
}
function deleteCompanyLocal(cId){
  S.companies=S.companies.filter(c=>c.id!==cId);
  lsSaveCompanies();
  // remove year entries
  for(let i=localStorage.length-1;i>=0;i--){
    const k=localStorage.key(i);
    if(k&&k.startsWith(`proforma_yr_v1_${cId}_`))localStorage.removeItem(k);
  }
  if(S.years[cId])delete S.years[cId];
}
function deleteYearLocal(cId,yr){
  localStorage.removeItem(`proforma_yr_v1_${cId}_${yr}`);
  if(S.years[cId])delete S.years[cId][yr];
}

// Firebase helpers
function fbSaveCompany(c){
  if(!db)return;
  db.collection('proforma_companies').doc(c.id).set(c).catch(()=>{});
}
function fbSaveYear(cId,yr,data){
  if(!db)return;
  db.collection('proforma_years').doc(`${cId}_${yr}`).set({...data,cId,yr:String(yr)}).catch(()=>{});
}
function fbDeleteCompany(cId){
  if(!db)return;
  db.collection('proforma_companies').doc(cId).delete().catch(()=>{});
}
function fbDeleteYear(cId,yr){
  if(!db)return;
  db.collection('proforma_years').doc(`${cId}_${yr}`).delete().catch(()=>{});
}

// ===== CALCULATIONS =====
function defaultSettings(){
  return{taxMode:'auto',taxRate:0.20,targetTax:0,cashAutoBalance:true};
}
function defaultDraft(){
  return{rev:0,otherRev:0,cogs:0,admin:0,depExp:0,interestExp:0,
    cash:0,ar:0,loanAr:0,inventory:0,oca:0,deposit:0,ppe:0,intangible:0,
    ap:0,shortLoan:0,longLoan:0,taxPay:0,ocl:0,longLoanNC:0,directorLoan:0,
    capital:0,reBegin:0};
}
function defaultBase(){
  return{rev:0,otherRev:0,cogs:0,admin:0,depExp:0,interestExp:0,tax:0,netIncome:0,
    cash:0,ar:0,loanAr:0,inventory:0,oca:0,deposit:0,ppe:0,intangible:0,
    ap:0,shortLoan:0,longLoan:0,taxPay:0,ocl:0,longLoanNC:0,directorLoan:0,
    capital:0,reBegin:0};
}
function defaultCF(){
  return{depreciation:0,dividends:0,interestPaid:0,loanProceeds:0,loanRepayment:0};
}
function defaultNotes(){
  return{

  };

function compute(draft,settings){
  const s=Object.assign(defaultSettings(),settings);
  let d=Object.assign({},draft);
  const taxRate=s.taxRate||0.20;
  const targetTax=s.targetTax||0;
  const mode=s.taxMode||'auto';

  if(mode==='target-rev'){
    d.rev=(targetTax/taxRate)+n(d.cogs)+n(d.admin)+n(d.depExp)+n(d.interestExp)-n(d.otherRev);
  }else if(mode==='target-cogs'){
    d.cogs=n(d.rev)+n(d.otherRev)-n(d.admin)-n(d.depExp)-n(d.interestExp)-(targetTax/taxRate);
  }

  const totalRev=n(d.rev)+n(d.otherRev);
  const grossProfit=totalRev-n(d.cogs);
  const ebitda=grossProfit-n(d.admin);
  const ebit=ebitda-n(d.depExp);
  const pbt=ebit-n(d.interestExp);
  const tax=mode==='auto'?Math.max(0,pbt*taxRate):targetTax;
  const netIncome=pbt-tax;

  const reEnd=n(d.reBegin)+netIncome;
  const totalEquity=n(d.capital)+reEnd;
  const currentLiab=n(d.ap)+n(d.shortLoan)+n(d.longLoan)+n(d.taxPay)+n(d.ocl);
  const nonCurrentLiab=n(d.longLoanNC)+n(d.directorLoan);
  const totalLiab=currentLiab+nonCurrentLiab;
  const totalLiabEq=totalLiab+totalEquity;
  let cash=n(d.cash);
  if(s.cashAutoBalance){
    cash=totalLiabEq-n(d.ar)-n(d.loanAr)-n(d.inventory)-n(d.oca)-n(d.deposit)-n(d.ppe)-n(d.intangible);
  }
  const currentAssets=cash+n(d.ar)+n(d.loanAr)+n(d.inventory)+n(d.oca)+n(d.deposit);
  const nonCurrentAssets=n(d.ppe)+n(d.intangible);
  const totalAssets=currentAssets+nonCurrentAssets;
  const diff=totalAssets-totalLiabEq;

  const grossMargin=totalRev!==0?grossProfit/totalRev*100:0;
  const ebitMargin=totalRev!==0?ebit/totalRev*100:0;
  const netMargin=totalRev!==0?netIncome/totalRev*100:0;
  const de=totalEquity!==0?totalLiab/totalEquity:0;
  const debtRatio=totalAssets!==0?totalLiab/totalAssets:0;
  const currentRatio=currentLiab!==0?currentAssets/currentLiab:0;
  const interestCoverage=n(d.interestExp)!==0?ebit/n(d.interestExp):null;

  return{
    d,
    pl:{totalRev,grossProfit,ebitda,ebit,pbt,tax,netIncome},
    bs:{cash,reEnd,totalEquity,currentLiab,nonCurrentLiab,totalLiab,totalLiabEq,currentAssets,nonCurrentAssets,totalAssets,diff},
    kpi:{grossMargin,ebitMargin,netMargin,de,debtRatio,currentRatio,interestCoverage}
  };
}

function computeBase(base){
  const b=Object.assign(defaultBase(),base);
  const totalRev=n(b.rev)+n(b.otherRev);
  const grossProfit=totalRev-n(b.cogs);
  const ebitda=grossProfit-n(b.admin);
  const ebit=ebitda-n(b.depExp);
  const pbt=ebit-n(b.interestExp);
  const tax=n(b.tax);
  const netIncome=b.netIncome!==undefined&&b.netIncome!==0?n(b.netIncome):(pbt-tax);
  const reEnd=n(b.reBegin)+netIncome;
  const totalEquity=n(b.capital)+reEnd;
  const currentLiab=n(b.ap)+n(b.shortLoan)+n(b.longLoan)+n(b.taxPay)+n(b.ocl);
  const nonCurrentLiab=n(b.longLoanNC)+n(b.directorLoan);
  const totalLiab=currentLiab+nonCurrentLiab;
  const totalLiabEq=totalLiab+totalEquity;
  const currentAssets=n(b.cash)+n(b.ar)+n(b.loanAr)+n(b.inventory)+n(b.oca)+n(b.deposit);
  const nonCurrentAssets=n(b.ppe)+n(b.intangible);
  const totalAssets=currentAssets+nonCurrentAssets;
  return{
    pl:{totalRev,grossProfit,ebitda,ebit,pbt,tax,netIncome},
    bs:{cash:n(b.cash),reEnd,totalEquity,currentLiab,nonCurrentLiab,totalLiab,totalLiabEq,currentAssets,nonCurrentAssets,totalAssets}
  };
}

function computeCF(base,draft,settings,cf,res){
  const b=Object.assign(defaultBase(),base);
  const d=res.d;
  const bs=res.bs;
  const pl=res.pl;
  const c=Object.assign(defaultCF(),cf);
  const dep=n(c.depreciation);
  const interestPaid=n(c.interestPaid);
  const loanProceeds=n(c.loanProceeds);
  const loanRepayment=n(c.loanRepayment);
  // Operating
  const dAR=n(d.ar)-n(b.ar);
  const dLoanAR=n(d.loanAr)-n(b.loanAr);
  const dInventory=n(d.inventory)-n(b.inventory);
  const dOCA=n(d.oca)-n(b.oca);
  const dDeposit=n(d.deposit)-n(b.deposit);
  const dAP=n(d.ap)-n(b.ap);
  const dTaxPay=n(d.taxPay)-n(b.taxPay);
  const dOCL=n(d.ocl)-n(b.ocl);
  const opCF=pl.netIncome+dep-dAR-dLoanAR-dInventory-dOCA-dDeposit+dAP+dTaxPay+dOCL-interestPaid;
  // Investing
  const dPPE=n(d.ppe)-n(b.ppe);
  const dIntangible=n(d.intangible)-n(b.intangible);
  const capex=dPPE+dep;
  const invCF=-(capex>0?capex:dPPE)-(dIntangible>0?dIntangible:0);
  // Financing
  const dCapital=n(d.capital)-n(b.capital);
  const dShortLoan=n(d.shortLoan)-n(b.shortLoan);
  const dDirectorLoan=n(d.directorLoan)-n(b.directorLoan);
  const divPaid=n(c.dividends);
  const finCF=dCapital+loanProceeds-loanRepayment+dShortLoan+dDirectorLoan-divPaid;
  const netCF=opCF+invCF+finCF;
  const beginCash=n(b.cash);
  const endCash=beginCash+netCF;
  return{
    netIncome:pl.netIncome,dep,
    dAR,dLoanAR,dInventory,dOCA,dDeposit,dAP,dTaxPay,dOCL,
    interestPaid:-interestPaid,
    opCF,
    dPPE,dIntangible,capex,invCF,
    dCapital,dShortLoan,dDirectorLoan,
    loanProceeds,loanRepayment:-loanRepayment,
    divPaid:-divPaid,finCF,
    netCF,beginCash,endCash,bsCash:bs.cash
  };
}

function computeBankability(pl,bs,kpi,cfRes){
  let score=0;
  const strengths=[],risks=[],recs=[];
  const nm=kpi.netMargin,gm=kpi.grossMargin,cr=kpi.currentRatio,de=kpi.de;
  const ic=kpi.interestCoverage,dr=kpi.debtRatio;
  // Net Margin (12)
  if(nm>=10){score+=12;strengths.push(`Net Margin ${nm.toFixed(1)}% — ดี`);}
  else if(nm>=5)score+=7;
  else if(nm>=0){score+=2;risks.push(`Net Margin ${nm.toFixed(1)}% — ต่ำ`);}
  else risks.push('Net Margin ติดลบ');
  // Gross Margin (10)
  if(gm>=25){score+=10;strengths.push(`Gross Margin ${gm.toFixed(1)}% — ดี`);}
  else if(gm>=15)score+=7;
  else if(gm>=5){score+=3;risks.push(`Gross Margin ${gm.toFixed(1)}% — ต่ำ`);}
  else risks.push('Gross Margin ต่ำมาก');
  // Current Ratio (15)
  if(cr>=2){score+=15;strengths.push(`Current Ratio ${cr.toFixed(2)} — ดี`);}
  else if(cr>=1.5)score+=12;
  else if(cr>=1){score+=6;risks.push(`Current Ratio ${cr.toFixed(2)} — ต่ำ`);}
  else risks.push(`Current Ratio ${cr.toFixed(2)} — ต่ำกว่า 1 วิกฤต`);
  // D/E (15)
  if(de<=1){score+=15;strengths.push(`D/E ${de.toFixed(2)} — ดี`);}
  else if(de<=2)score+=10;
  else if(de<=3){score+=5;risks.push(`D/E ${de.toFixed(2)} — สูง`);}
  else risks.push(`D/E ${de.toFixed(2)} — สูงมาก`);
  // Interest Coverage (15)
  if(ic===null){score+=8;}
  else if(ic>=3){score+=15;strengths.push(`Interest Coverage ${ic.toFixed(1)} — ดี`);}
  else if(ic>=1.5)score+=8;
  else{risks.push(`Interest Coverage ${ic.toFixed(1)} — ต่ำกว่า 1.5`);}
  // Operating CF (10)
  if(cfRes&&cfRes.opCF>0){score+=10;strengths.push('กระแสเงินสดดำเนินงานเป็นบวก');}
  else if(cfRes&&cfRes.opCF<=0)risks.push('กระแสเงินสดดำเนินงานติดลบ');
  // Cash (8)
  if(bs.cash>0)score+=8;
  else risks.push('เงินสดติดลบ');
  // Tax consistency (8)
  if(pl.pbt>0){
    const tp=pl.tax/pl.pbt*100;
    if(tp>=15){score+=8;strengths.push(`ภาษี ${tp.toFixed(1)}% ของ PBT สมเหตุสมผล`);}
    else if(tp>=5)score+=4;
    else risks.push(`ภาษี ${tp.toFixed(1)}% ของ PBT — อาจถูกตั้งคำถาม`);
  }else score+=4;
  // Revenue (7)
  if(pl.totalRev>0)score+=7;
  else risks.push('ยังไม่มีรายได้');
  // Recommendations
  if(de>2)recs.push('เพิ่มทุนหรือแปลงเงินกู้กรรมการเป็นทุน เพื่อลด D/E');
  if(cr<1.5)recs.push('เพิ่มเงินทุนหมุนเวียน หรือปรับโครงสร้างหนี้ระยะสั้นเป็นระยะยาว');
  if(nm<5)recs.push('ลดต้นทุนหรือค่าใช้จ่าย เพื่อเพิ่ม Net Margin');
  if(ic!==null&&ic<2)recs.push('ลดภาระดอกเบี้ย หรือเพิ่ม EBIT ก่อนยื่นกู้');
  if(pl.pbt>0&&pl.tax/pl.pbt<0.1)recs.push('ปรับภาษีให้ใกล้ 20% ของกำไรก่อนภาษี เพื่อความน่าเชื่อถือ');
  if(bs.cash<0)recs.push('แก้ปัญหาเงินสดติดลบก่อน — ธนาคารจะไม่อนุมัติ');
  const level=score>=80?'ดีมาก':score>=65?'ดี':score>=50?'พอใช้':score>=35?'เสี่ยง':'เสี่ยงสูง';
  const levelCls=score>=65?'green':score>=50?'amber':'red';
  return{score,level,levelCls,strengths,risks,recommendations:recs};
}

function computeRedFlags(pl,bs,kpi,cfRes,base){
  const flags=[];
  function flag(label,status,desc,suggest){flags.push({label,status,desc,suggest});}
  if(Math.abs(bs.diff)>1)flag('งบดุลไม่ดุล','critical',`ส่วนต่าง ${fmt(bs.diff)}`,'ตรวจสอบ BS ทุกรายการ');
  else flag('งบดุล','ok','สมดุล','');
  flag('เงินสด',bs.cash<0?'critical':bs.cash===0?'warn':'ok',
    bs.cash<0?`เงินสด ${fmt(bs.cash)}`:`${fmt(bs.cash)}`,
    bs.cash<0?'เพิ่มเงินสด หรือตรวจ Auto-Balance':'');
  const crSt=kpi.currentRatio<1?'critical':kpi.currentRatio<1.5?'warn':'ok';
  flag('Current Ratio',crSt,kpi.currentRatio.toFixed(2),crSt!=='ok'?'เพิ่มสินทรัพย์หมุนเวียน หรือลดหนี้ระยะสั้น':'');
  const deSt=kpi.de>3?'critical':kpi.de>2?'warn':'ok';
  flag('D/E Ratio',deSt,kpi.de.toFixed(2),deSt!=='ok'?'เพิ่มทุน หรือลดหนี้':'');
  if(kpi.interestCoverage!==null){
    const icSt=kpi.interestCoverage<1.5?'critical':kpi.interestCoverage<2.5?'warn':'ok';
    flag('Interest Coverage',icSt,kpi.interestCoverage.toFixed(2),icSt!=='ok'?'เพิ่ม EBIT หรือลดดอกเบี้ย':'');
  }
  if(pl.pbt>0){
    const tp=pl.tax/pl.pbt*100;
    flag('อัตราภาษีต่อ PBT',tp<5?'critical':tp<15?'warn':'ok',`${tp.toFixed(1)}%`,tp<5?'ปรับภาษีให้ใกล้ 20% — ธนาคารตั้งคำถาม':'');
  }
  if(cfRes)flag('กระแสเงินสดดำเนินงาน',cfRes.opCF<0?'warn':'ok',fmt(cfRes.opCF),cfRes.opCF<0?'ตรวจสอบเงินทุนหมุนเวียน':'');
  flag('กำไรสุทธิ',pl.netIncome<0?'critical':pl.netIncome===0?'warn':'ok',fmt(pl.netIncome),pl.netIncome<0?'แก้โครงสร้างรายได้/ค่าใช้จ่าย':'');
  flag('รายได้รวม',pl.totalRev<=0?'critical':'ok',fmt(pl.totalRev),pl.totalRev<=0?'กรอกรายได้ให้ครบ':'');
  // Director loan too high
  if(n(base.directorLoan)>0&&bs.totalAssets>0){
    const dlRatio=n(base.directorLoan)/bs.totalAssets*100;
    if(dlRatio>30)flag('เงินกู้กรรมการสูง','warn',`${dlRatio.toFixed(1)}% ของสินทรัพย์`,'พิจารณาแปลงเป็นทุน');
  }
  return flags;
}

function computeLoanCapacity(ebitda,interestRate,termMonths,dscrTarget){
  if(!ebitda||ebitda<=0||!interestRate||!termMonths||!dscrTarget)return null;
  const annualDS=ebitda/dscrTarget;
  const monthlyDS=annualDS/12;
  const r=interestRate/12;
  const loanCapacity=r>0?monthlyDS*(1-Math.pow(1+r,-termMonths))/r:monthlyDS*termMonths;
  return{ebitda,annualDS,monthlyDS,loanCapacity,dscr:dscrTarget};
}

// ===== FIREBASE INIT =====
function initFirebase(){
  const s1=document.createElement('script');
  s1.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js';
  s1.onload=()=>{
    const s2=document.createElement('script');
    s2.src='https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js';
    s2.onload=()=>{
      try{
        firebase.initializeApp(FB_CFG);
        db=firebase.firestore();
        db.enablePersistence({synchronizeTabs:false}).catch(()=>{});
        S.online=true;
        document.getElementById('dot').classList.add('on');
        document.getElementById('dot-lbl').textContent='ออนไลน์';
        loadFromFirebase();
      }catch(e){console.warn('Firebase:',e);}
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s1);
}

async function loadFromFirebase(){
  try{
    // Load companies
    const snap=await db.collection('proforma_companies').get();
    snap.forEach(doc=>{
      const c=doc.data();
      if(!S.companies.find(x=>x.id===c.id)){
        S.companies.push(c);
      }
    });
    lsSaveCompanies();
    // Load years for all companies
    const ySnap=await db.collection('proforma_years').get();
    ySnap.forEach(doc=>{
      const data=doc.data();
      const cId=data.cId;
      const yr=data.yr;
      if(cId&&yr){
        if(!S.years[cId])S.years[cId]={};
        if(!S.years[cId][yr]){
          S.years[cId][yr]=data;
          lsSaveYear(cId,yr,data);
        }
      }
    });
    render();
  }catch(e){console.warn('Firebase load:',e);}
}

function esc(s){

}

// ===== DRAFT TAB =====
function renderDraftTab(yd){
  const settings=Object.assign(defaultSettings(),yd.settings||{});
  const draft=Object.assign(defaultDraft(),yd.draft||{});
  const base=Object.assign(defaultBase(),yd.base||{});
  const res=compute(draft,settings);
  const baseRes=computeBase(base);
  const d=res.d;const pl=res.pl;const bs=res.bs;const kpi=res.kpi;
  const mode=settings.taxMode||'auto';
  const cashAuto=settings.cashAutoBalance;

  function inp(field,val,disabled=false){
    const v=(val!==undefined&&val!==null)?val:n(d[field]);
    return`<input class="ni" type="number" step="0.01" id="di-${field}" value="${v}"
      ${disabled?'disabled':''} onchange="onDraftChange('${field}',this.value)">`;
  }
  function cv(id,val,neg=false){
    return`<span class="cv${neg&&val<0?' neg':''}" id="${id}">${fmt(val)}</span>`;
  }
  function bv(v){return`<span style="color:var(--gray)">${fmt(v)}</span>`;}

  const isRev=mode==='target-rev',isCogs=mode==='target-cogs';
  const diffHtml=Math.abs(bs.diff)<1
    ?`<span class="diff-ok">✓ ดุล (${fmt(bs.diff)})</span>`
    :`<span class="diff-err">⚠ ไม่ดุล (${fmt(bs.diff)})</span>`;

  function kpiCard(label,val,unit,cls,id){
    return`<div class="kpi ${cls}" id="${id}-box"><div class="kl">${label}</div>`+
      `<div class="kv" id="${id}">${val}${unit}</div></div>`;
  }
  const gmCls=kpi.grossMargin>=20?'pos':kpi.grossMargin>=0?'':'neg';
  const emCls=kpi.ebitMargin>=10?'pos':kpi.ebitMargin>=0?'':'neg';
  const nmCls=kpi.netMargin>=5?'pos':kpi.netMargin>=0?'':'neg';
  const deCls=kpi.de<1?'pos':kpi.de<2?'warn':'neg';
  const drCls=kpi.debtRatio<0.5?'pos':kpi.debtRatio<0.7?'warn':'neg';
  const crCls=kpi.currentRatio>=2?'pos':kpi.currentRatio>=1?'warn':'neg';
  const icCls=kpi.interestCoverage===null?'':kpi.interestCoverage>=3?'pos':kpi.interestCoverage>=1.5?'warn':'neg';

  return`
  <div class="sp">
    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">การตั้งค่าการคำนวณ</div>
    <div class="sgrid">
      <div>
        <span class="sl">โหมดภาษี</span>
        <select class="fc" id="s-taxMode" onchange="onSettingChange('taxMode',this.value)">
          <option value="auto" ${mode==='auto'?'selected':''}>Auto (PBT × Rate)</option>
          <option value="target-rev" ${mode==='target-rev'?'selected':''}>Target Tax → คำนวณ REV</option>
          <option value="target-cogs" ${mode==='target-cogs'?'selected':''}>Target Tax → คำนวณ COGS</option>
        </select>
      </div>
      <div>
        <span class="sl">อัตราภาษี (%)</span>
        <input type="number" class="fc" id="s-taxRate" step="0.1" min="0" max="100"
          value="${(settings.taxRate*100).toFixed(1)}"
          onchange="onSettingChange('taxRate',parseFloat(this.value)/100)">
      </div>
      <div id="target-tax-wrap" ${mode==='auto'?'style="display:none"':''}>
        <span class="sl">ภาษีเป้าหมาย (บาท)</span>
        <input type="number" class="fc" id="s-targetTax" step="1000" value="${settings.targetTax||0}"
          onchange="onSettingChange('targetTax',parseFloat(this.value)||0)">
      </div>
      <div>
        <span class="sl">เงินสด</span>
        <div class="tog-row">
          <label class="tog">
            <input type="checkbox" id="s-cashAuto" ${cashAuto?'checked':''}
              onchange="onSettingChange('cashAutoBalance',this.checked)">
            <span class="tsl"></span>
          </label>
          <span style="font-size:12px;color:var(--gray)">Auto-Balance</span>
        </div>
      </div>
    </div>
  </div>

  <div class="kpi-grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr))">
    ${kpiCard('Gross Margin',fmtPct(kpi.grossMargin),'',gmCls,'cv-kpi-gm')}
    ${kpiCard('EBIT Margin',fmtPct(kpi.ebitMargin),'',emCls,'cv-kpi-em')}
    ${kpiCard('Net Margin',fmtPct(kpi.netMargin),'',nmCls,'cv-kpi-nm')}
    ${kpiCard('D/E Ratio',isFinite(kpi.de)?kpi.de.toFixed(2):'-',' เท่า',deCls,'cv-kpi-de')}
    ${kpiCard('Debt Ratio',isFinite(kpi.debtRatio)?(kpi.debtRatio*100).toFixed(1)+'%':'','',drCls,'cv-kpi-dr')}
    ${kpiCard('Current Ratio',isFinite(kpi.currentRatio)?kpi.currentRatio.toFixed(2):'-',' เท่า',crCls,'cv-kpi-cr')}
    ${kpiCard('Interest Coverage',kpi.interestCoverage!==null?kpi.interestCoverage.toFixed(1):'-',' เท่า',icCls,'cv-kpi-ic')}
  </div>

  <!-- P&L -->
  <div class="card" style="overflow-x:auto;margin-bottom:16px;padding:0">
    <div style="padding:14px 16px 4px;font-size:13px;font-weight:700;color:var(--navy);border-bottom:1px solid var(--border)">งบกำไรขาดทุนเบ็ดเสร็จ</div>
    <table class="ft"><thead><tr>
      <th style="width:42%">รายการ</th><th style="width:29%">ร่างปรับใหม่</th><th style="width:29%">ปีฐาน</th>
    </tr></thead><tbody>
      <tr class="sh"><td colspan="3">รายได้</td></tr>
      <tr class="ind">
        <td>รายได้จากการขาย/รับเหมา ${isRev?'<span style="font-size:10px;color:var(--blue)">[คำนวณ]</span>':''}</td>
        <td class="num-r">${inp('rev',d.rev,isRev)}</td><td class="num-r">${bv(base.rev)}</td>
      </tr>
      <tr class="ind"><td>รายได้อื่น</td><td class="num-r">${inp('otherRev')}</td><td class="num-r">${bv(base.otherRev)}</td></tr>
      <tr class="tr-sub"><td>รวมรายได้</td><td class="num-r">${cv('cv-totalRev',pl.totalRev)}</td><td class="num-r">${bv(baseRes.pl.totalRev)}</td></tr>
      <tr class="sh"><td colspan="3">ค่าใช้จ่าย</td></tr>
      <tr class="ind">
        <td>ต้นทุนขาย/ต้นทุนก่อสร้าง ${isCogs?'<span style="font-size:10px;color:var(--blue)">[คำนวณ]</span>':''}</td>
        <td class="num-r">${inp('cogs',d.cogs,isCogs)}</td><td class="num-r">${bv(base.cogs)}</td>
      </tr>
      <tr class="ind"><td>ค่าใช้จ่ายในการบริหาร</td><td class="num-r">${inp('admin')}</td><td class="num-r">${bv(base.admin)}</td></tr>
      <tr class="tr-sub"><td>กำไรขั้นต้น</td><td class="num-r">${cv('cv-grossProfit',pl.grossProfit)}</td><td class="num-r">${bv(baseRes.pl.grossProfit)}</td></tr>
      <tr class="ind"><td>ค่าเสื่อมราคา</td><td class="num-r">${inp('depExp')}</td><td class="num-r">${bv(base.depExp)}</td></tr>
      <tr class="tr-sub" style="background:#EFF6FF"><td><b>EBIT</b></td><td class="num-r">${cv('cv-ebit',pl.ebit)}</td><td class="num-r">${bv(baseRes.pl.ebit)}</td></tr>
      <tr class="ind"><td>ดอกเบี้ยจ่าย</td><td class="num-r">${inp('interestExp')}</td><td class="num-r">${bv(base.interestExp)}</td></tr>

    </tbody></table>
  </div>

  <!-- Balance Sheet -->
  <div class="card" style="overflow-x:auto;margin-bottom:16px;padding:0">

      <th style="width:42%">รายการ</th><th style="width:29%">ร่างปรับใหม่</th><th style="width:29%">ปีฐาน</th>

// ===== CASH FLOW TAB =====

  const r=computeCF(base,draft,settings,cf,res);

  function cfRow(label,val,indent,bold,id){
    const st=(indent?'padding-left:24px;':'')+(bold?'font-weight:700':'');
    const numSt='text-align:right;font-family:"Courier New",monospace;font-size:12px;'+(bold?'font-weight:700':'');
    return`<tr>
      <td style="${st};padding:4px 12px">${label}</td>
      <td style="${numSt};padding:4px 12px"${id?` id="${id}"`:''}>${fmt(val)}</td>
    </tr>`;

  function secHdr(label){
    return`<tr><td colspan="2" style="padding:8px 12px;font-weight:700;color:var(--navy);font-size:11px;background:#F0F4F8;text-transform:uppercase;letter-spacing:.4px">${label}</td></tr>`;

    return`<tr style="border-top:1.5px solid #CBD5E1">

    <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px">รายการปรับปรุง (กรอกเอง)</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;max-width:700px">

          onchange="onCFChange('dividends',this.value)">

        <label class="fl">ดอกเบี้ยจ่ายจริง (Cash)</label>
        <input type="number" class="fc" id="cf-interestPaid" step="0.01" value="${n(cf.interestPaid)}"
          onchange="onCFChange('interestPaid',this.value)">
      </div>
      <div class="fg">
        <label class="fl">รับเงินกู้ระยะยาว</label>
        <input type="number" class="fc" id="cf-loanProceeds" step="0.01" value="${n(cf.loanProceeds)}"
          onchange="onCFChange('loanProceeds',this.value)">

        ${cfRow('ลูกหนี้การค้า (เพิ่ม)/ลด',-r.dAR,true,false)}
        ${r.dLoanAR!==0?cfRow('ลูกหนี้เงินกู้ (เพิ่ม)/ลด',-r.dLoanAR,true,false):''}
        ${r.dInventory!==0?cfRow('สินค้าคงเหลือ (เพิ่ม)/ลด',-r.dInventory,true,false):''}
        ${r.dOCA!==0?cfRow('สินทรัพย์หมุนเวียนอื่น (เพิ่ม)/ลด',-r.dOCA,true,false):''}
        ${r.dDeposit!==0?cfRow('เงินมัดจำ (เพิ่ม)/ลด',-r.dDeposit,true,false):''}
        ${cfRow('เจ้าหนี้การค้า เพิ่ม/(ลด)',r.dAP,true,false)}
        ${r.dTaxPay!==0?cfRow('ภาษีค้างจ่าย เพิ่ม/(ลด)',r.dTaxPay,true,false):''}
        ${r.dOCL!==0?cfRow('หนี้สินหมุนเวียนอื่น เพิ่ม/(ลด)',r.dOCL,true,false):''}
        ${r.interestPaid!==0?cfRow('จ่ายดอกเบี้ย',r.interestPaid,true,false):''}
        ${subTotal('เงินสดสุทธิจากกิจกรรมดำเนินงาน',r.opCF,'cf-opCF')}

        ${r.dIntangible>0?cfRow('จ่ายซื้อสินทรัพย์ไม่มีตัวตน',-r.dIntangible,true,false):''}
        ${subTotal('เงินสดสุทธิจากกิจกรรมลงทุน',r.invCF,'cf-invCF')}

        ${secHdr('กระแสเงินสดจากกิจกรรมจัดหาเงิน')}
        ${r.dCapital!==0?cfRow('รับเพิ่มทุน',r.dCapital,true,false):''}
        ${r.loanProceeds!==0?cfRow('รับเงินกู้ระยะยาว',r.loanProceeds,true,false):''}
        ${r.loanRepayment!==0?cfRow('ชำระคืนเงินกู้ระยะยาว',r.loanRepayment,true,false):''}
        ${r.dShortLoan!==0?cfRow('เงินกู้ระยะสั้น เพิ่ม/(ลด)',r.dShortLoan,true,false):''}
        ${r.dDirectorLoan!==0?cfRow('เงินกู้กรรมการ เพิ่ม/(ลด)',r.dDirectorLoan,true,false):''}
        ${r.divPaid!==0?cfRow('จ่ายเงินปันผล',r.divPaid,true,false):''}
        ${subTotal('เงินสดสุทธิจากกิจกรรมจัดหาเงิน',r.finCF,'cf-finCF')}

        <tr style="background:#EFF6FF;border-top:2px solid var(--blue);border-bottom:2px solid var(--blue)">
          <td style="font-weight:700;padding:9px 12px">เงินสดเพิ่ม (ลด) สุทธิสำหรับปี</td>
          <td style="text-align:right;font-weight:700;font-family:'Courier New',monospace;font-size:12px;padding:9px 12px" id="cf-netCF">${fmt(r.netCF)}</td>
        </tr>
        ${cfRow('เงินสดต้นปี',r.beginCash,false,false)}
        <tr style="background:#F0F4F8;border-top:2px solid #000;border-bottom:2px solid #000">
          <td style="font-weight:700;padding:9px 12px">เงินสดปลายปี</td>
          <td style="text-align:right;font-weight:700;font-family:'Courier New',monospace;font-size:12px;padding:9px 12px" id="cf-endCash">${fmt(r.endCash)}</td>
        </tr>
        <tr>
          <td colspan="2" style="padding:8px 12px;font-size:12px">
            ตรวจสอบกับงบดุล (เงินสด: <b>${fmtNum(r.bsCash)}</b>)
            <span style="${cashMatch?'color:var(--green)':'color:var(--red)'};font-weight:700;margin-left:8px">${cashMatch?'✓ ตรงกัน':'⚠ ไม่ตรงกัน — ตรวจสอบค่าเสื่อมราคา/ทุน'}</span>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button class="btn btn-secondary" onclick="switchTab('draft')">← กลับร่างปรับใหม่</button>
    <button class="btn btn-success" onclick="exportExcel()">⬇ Export Excel</button>
    <button class="btn btn-primary" onclick="exportPDF()">📄 Export PDF</button>

}

// ===== BANK ANALYSIS TAB =====
function renderBankTab(yd){
  const settings=Object.assign(defaultSettings(),yd.settings||{});
  const draft=Object.assign(defaultDraft(),yd.draft||{});
  const base=Object.assign(defaultBase(),yd.base||{});
  const cf=Object.assign(defaultCF(),yd.cf||{});
  const res=compute(draft,settings);
  const cfRes=computeCF(base,draft,settings,cf,res);
  const bank=computeBankability(res.pl,res.bs,res.kpi,cfRes);
  const flags=computeRedFlags(res.pl,res.bs,res.kpi,cfRes,base);
  const ebitda=res.pl.ebitda;
  const ba=Object.assign(defaultBankAnalysis(),yd.bankAnalysis||{});
  const lc=ba.loanCapacity||{};
  const lRate=n(lc.interestRate)||0.06;
  const lTerm=n(lc.termMonths)||60;
  const lDSCR=n(lc.dscrTarget)||1.25;
  const lcRes=computeLoanCapacity(ebitda,lRate,lTerm,lDSCR);
  const scenarios=yd.scenarios||[];

  const ringColor=bank.levelCls==='green'?'var(--green)':bank.levelCls==='amber'?'var(--amber)':'var(--red)';
  const strHtml=bank.strengths.map(s=>`<li style="color:var(--green);margin-bottom:3px">✓ ${esc(s)}</li>`).join('');
  const riskHtml=bank.risks.map(r=>`<li style="color:var(--red);margin-bottom:3px">⚠ ${esc(r)}</li>`).join('');
  const recHtml=bank.recommendations.map(r=>`<li style="margin-bottom:4px">${esc(r)}</li>`).join('');

  const flagRows=flags.map(f=>`<tr>
    <td class="flag-${f.status}" style="padding:6px 10px;white-space:nowrap">
      ${f.status==='ok'?'✓':f.status==='warn'?'⚠':'✕'} ${esc(f.label)}</td>
    <td style="padding:6px 10px">${esc(f.desc)}</td>
    <td style="padding:6px 10px;color:var(--gray);font-size:11px">${esc(f.suggest||'')}</td>
  </tr>`).join('');

  const scHtml=scenarios.length===0
    ?`<p style="color:var(--gray);font-size:12px;margin:0">ยังไม่มี Scenario ที่บันทึก — กด "+ บันทึก Scenario ปัจจุบัน" เพื่อบันทึก</p>`
    :scenarios.map((sc,i)=>`<div class="sc-card">
        <div style="flex:1">
          <div class="sc-name">${esc(sc.name)}</div>
          <div class="sc-meta">${sc.note?esc(sc.note)+' &nbsp;|&nbsp; ':''}Rev: ${fmt(sc.pl?.totalRev)} &nbsp;|&nbsp; Net: ${fmt(sc.pl?.netIncome)} &nbsp;|&nbsp; Score: <b>${sc.score||0}</b>/100</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0">
          <button class="btn btn-xs btn-secondary" onclick="loadScenario(${i})">โหลด</button>
          <button class="btn btn-xs btn-danger" onclick="deleteScenario(${i})">✕</button>
        </div>
      </div>`).join('');

  return`
  <div style="font-size:13px;color:var(--gray);margin-bottom:16px">
    วิเคราะห์ศักยภาพสินเชื่อ — คำนวณ Real-time จากข้อมูลใน Tab B (ร่างปรับใหม่)
  </div>

  <div class="stit">Bankability Score</div>
  <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;margin-bottom:20px;padding:16px;background:#fff;border:1px solid var(--border);border-radius:var(--r)">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex-shrink:0">
      <div class="score-ring ${bank.levelCls}">
        <div class="score-num">${bank.score}</div>
        <div class="score-lbl">/ 100</div>
      </div>
      <div style="font-size:14px;font-weight:700;color:${ringColor}">${bank.level}</div>
    </div>
    <div style="flex:1;min-width:200px;display:grid;grid-template-columns:1fr 1fr;gap:12px">
      ${bank.strengths.length?`<div>
        <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:6px">จุดแข็ง</div>
        <ul style="padding-left:16px;margin:0;font-size:12px">${strHtml}</ul>
      </div>`:''}

function updateCalcCells(yd){
  const settings=Object.assign(defaultSettings(),yd.settings||{});
  const draft=Object.assign(defaultDraft(),yd.draft||{});
  const res=compute(draft,settings);
  const pl=res.pl;const bs=res.bs;const kpi=res.kpi;const d=res.d;
  const mode=settings.taxMode||'auto';

  function setCV(id,val,neg=false){
    const el=document.getElementById(id);
    if(!el)return;
    el.className='cv'+(neg&&val<0?' neg':'');
    el.textContent=fmt(val);
  }
  if(mode==='target-rev'){const el=document.getElementById('di-rev');if(el)el.value=d.rev.toFixed(2);}
  else if(mode==='target-cogs'){const el=document.getElementById('di-cogs');if(el)el.value=d.cogs.toFixed(2);}
  if(settings.cashAutoBalance){const el=document.getElementById('cv-cash');if(el)el.textContent=fmt(bs.cash);}

  // P&L
  setCV('cv-totalRev',pl.totalRev);
  setCV('cv-grossProfit',pl.grossProfit);
  setCV('cv-ebit',pl.ebit);
  setCV('cv-pbt',pl.pbt);
  setCV('cv-tax',pl.tax);
  setCV('cv-netIncome',pl.netIncome,true);
  // BS Assets
  setCV('cv-curAssets',bs.currentAssets);
  setCV('cv-ncAssets',bs.nonCurrentAssets);
  setCV('cv-totAssets',bs.totalAssets);
  // BS Liab
  setCV('cv-curLiab',bs.currentLiab);
  setCV('cv-ncLiab',bs.nonCurrentLiab);
  setCV('cv-totLiab',bs.totalLiab);
  // BS Equity
  setCV('cv-netIncome2',pl.netIncome,true);
  setCV('cv-reEnd',bs.reEnd);
  setCV('cv-totEquity',bs.totalEquity);
  setCV('cv-totLiabEq',bs.totalLiabEq);

  const diffEl=document.getElementById('cv-diff');
  if(diffEl){
    diffEl.innerHTML=Math.abs(bs.diff)<1
      ?`<span class="diff-ok">✓ ดุล (${fmt(bs.diff)})</span>`
      :`<span class="diff-err">⚠ ไม่ดุล (${fmt(bs.diff)})</span>`;
  }

  function setKPI(id,val,unit,cls){
    const el=document.getElementById(id);const box=document.getElementById(id+'-box');
    if(el)el.textContent=val+unit;if(box)box.className='kpi '+cls;
  }
  setKPI('cv-kpi-gm',fmtPct(kpi.grossMargin),'',kpi.grossMargin>=20?'pos':kpi.grossMargin>=0?'':'neg');
  setKPI('cv-kpi-em',fmtPct(kpi.ebitMargin),'',kpi.ebitMargin>=10?'pos':kpi.ebitMargin>=0?'':'neg');
  setKPI('cv-kpi-nm',fmtPct(kpi.netMargin),'',kpi.netMargin>=5?'pos':kpi.netMargin>=0?'':'neg');
  setKPI('cv-kpi-de',isFinite(kpi.de)?kpi.de.toFixed(2):'-',' เท่า',kpi.de<1?'pos':kpi.de<2?'warn':'neg');
  setKPI('cv-kpi-dr',isFinite(kpi.debtRatio)?(kpi.debtRatio*100).toFixed(1)+'%':'','',kpi.debtRatio<0.5?'pos':kpi.debtRatio<0.7?'warn':'neg');
  setKPI('cv-kpi-cr',isFinite(kpi.currentRatio)?kpi.currentRatio.toFixed(2):'-',' เท่า',kpi.currentRatio>=2?'pos':kpi.currentRatio>=1?'warn':'neg');
  setKPI('cv-kpi-ic',kpi.interestCoverage!==null?kpi.interestCoverage.toFixed(1):'-',' เท่า',kpi.interestCoverage===null?'':kpi.interestCoverage>=3?'pos':kpi.interestCoverage>=1.5?'warn':'neg');
}

function applyRatioSuggestions(){
  if(!confirm('ต้องการให้ระบบปรับตัวเลขอัตโนมัติตามคำแนะนำ?\n\n• แปลงเงินกู้กรรมการเป็นทุน (ถ้า D/E > 2)\n• ปรับอัตราภาษีเป็น 20% (ถ้าภาษีต่ำเกินไป)\n\n(Draft ปัจจุบันจะถูกปรับ — แนะนำบันทึก Scenario ก่อน)'))return;
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd)return;
  if(!yd.draft)yd.draft=defaultDraft();
  if(!yd.settings)yd.settings=defaultSettings();
  const settings=Object.assign(defaultSettings(),yd.settings);
  const res=compute(Object.assign(defaultDraft(),yd.draft),settings);
  const kpi=res.kpi;
  let changed=false;
  if(kpi.de>2&&n(yd.draft.directorLoan)>0){
    const conv=yd.draft.directorLoan;
    yd.draft.directorLoan=0;
    yd.draft.capital=n(yd.draft.capital)+conv;
    toast(`แปลงเงินกู้กรรมการ ${fmtNum(conv)} บาท เป็นทุนแล้ว`,'ok');
    changed=true;
  }
  if(res.pl.pbt>0&&res.pl.tax/res.pl.pbt<0.10&&settings.taxMode==='auto'){
    yd.settings.taxRate=0.20;
    toast('ปรับอัตราภาษีเป็น 20% แล้ว','ok');
    changed=true;
  }
  if(!changed){toast('ไม่มีรายการที่ระบบแนะนำให้ปรับ','warn');return;}
  yd.updatedAt=Date.now();
  saveYearLocal(S.currentCo,S.currentYear,yd);
  fbSaveYear(S.currentCo,S.currentYear,yd);
  render();
}

function handleSaveScenario(){
  const name=(document.getElementById('sc-name')?.value||'').trim();
  if(!name){toast('กรุณากรอกชื่อ Scenario','err');return;}
  const note=document.getElementById('sc-note')?.value||'';
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd)return;
  const settings=Object.assign(defaultSettings(),yd.settings||{});
  const draft=Object.assign(defaultDraft(),yd.draft||{});
  const base=Object.assign(defaultBase(),yd.base||{});
  const cf=Object.assign(defaultCF(),yd.cf||{});
  const res=compute(draft,settings);
  const cfRes=computeCF(base,draft,settings,cf,res);
  const bank=computeBankability(res.pl,res.bs,res.kpi,cfRes);
  if(!yd.scenarios)yd.scenarios=[];
  yd.scenarios.push({
    name,note,
    draft:Object.assign({},draft),
    settings:Object.assign({},settings),
    pl:res.pl,bs:res.bs,kpi:res.kpi,
    score:bank.score,level:bank.level,
    savedAt:Date.now()
  });
  yd.updatedAt=Date.now();
  saveYearLocal(S.currentCo,S.currentYear,yd);
  fbSaveYear(S.currentCo,S.currentYear,yd);
  closeModal();
  toast(`บันทึก Scenario "${name}" แล้ว`,'ok');
  const el=document.getElementById('ed-tab-content');
  if(el)el.innerHTML=renderBankTab(yd);
}

function loadScenario(idx){
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd||!yd.scenarios||!yd.scenarios[idx])return;
  const sc=yd.scenarios[idx];
  if(!confirm(`โหลด Scenario "${sc.name}" มาแทน Draft ปัจจุบัน?\n(Draft ปัจจุบันจะถูกแทนที่ — แนะนำบันทึกก่อน)`))return;
  yd.draft=Object.assign({},sc.draft||{});
  if(sc.settings)yd.settings=Object.assign({},sc.settings);
  yd.updatedAt=Date.now();
  saveYearLocal(S.currentCo,S.currentYear,yd);
  fbSaveYear(S.currentCo,S.currentYear,yd);
  toast(`โหลด Scenario "${sc.name}" แล้ว`,'ok');
  S.editorTab='draft';
  render();
}

function deleteScenario(idx){
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd||!yd.scenarios)return;
  const sc=yd.scenarios[idx];
  if(!sc||!confirm(`ลบ Scenario "${sc.name}"?`))return;
  yd.scenarios.splice(idx,1);
  yd.updatedAt=Date.now();
  saveYearLocal(S.currentCo,S.currentYear,yd);
  const el=document.getElementById('ed-tab-content');
  if(el)el.innerHTML=renderBankTab(yd);
}

let _aiFileData=null;
let _aiFileType=null;

function switchAITab(tab){
  document.getElementById('ai-tab-file').style.display=tab==='file'?'':'none';
  document.getElementById('ai-tab-text').style.display=tab==='text'?'':'none';
  document.getElementById('tab-btn-file').style.cssText=tab==='file'?'border-bottom:2px solid var(--blue);color:var(--blue)':'';
  document.getElementById('tab-btn-text').style.cssText=tab==='text'?'border-bottom:2px solid var(--blue);color:var(--blue)':'';
}

function handleAIFileDrop(e){
  e.preventDefault();
  document.getElementById('ai-drop-zone').style.borderColor='var(--border)';
  const file=e.dataTransfer.files[0];
  if(file)loadAIFile(file);
}
function handleAIFileSelect(input){
  const file=input.files[0];
  if(file)loadAIFile(file);
}
function loadAIFile(file){
  const maxMB=4.5;
  if(file.size>maxMB*1024*1024){toast(`ไฟล์ใหญ่เกิน ${maxMB}MB กรุณาลดขนาดก่อน`,'err');return;}
  const reader=new FileReader();
  reader.onload=e=>{
    const b64=e.target.result.split(',')[1];
    _aiFileData=b64;
    _aiFileType=file.type||'application/pdf';
    const prev=document.getElementById('ai-file-preview');
    document.getElementById('ai-file-name').textContent=file.name;
    document.getElementById('ai-file-size').textContent=(file.size/1024).toFixed(1)+' KB';
    document.getElementById('ai-file-icon').textContent=file.type.startsWith('image')?'🖼️':'📄';
    prev.style.display='';
  };
  reader.readAsDataURL(file);
}
function clearAIFile(){
  _aiFileData=null;_aiFileType=null;
  document.getElementById('ai-file-preview').style.display='none';
  document.getElementById('ai-file-input').value='';
}

function saveApiKey(){
  const k=(document.getElementById('ai-key-input')?.value||'').trim();
  if(k){localStorage.setItem('claude_api_key',k);toast('บันทึก API Key แล้ว','ok');}
}

async function runAIImport(){
  const apiKey=localStorage.getItem('claude_api_key');
  if(!apiKey){toast('กรุณาตั้งค่า Claude API Key ก่อน','warn');return;}

  const tabFile=document.getElementById('ai-tab-file');
  const useFile=tabFile&&tabFile.style.display!=='none';

  const prompt=`คุณเป็นนักบัญชีผู้เชี่ยวชาญ TFRS for NPAEs
วิเคราะห์งบการเงินนี้และสกัดตัวเลขทั้งหมด (หน่วยบาท ไม่ต้องใส่ comma)
ตอบเฉพาะ JSON object เท่านั้น ไม่มีข้อความอื่น:
{"rev":0,"otherRev":0,"cogs":0,"admin":0,"depExp":0,"interestExp":0,"tax":0,"netIncome":0,"cash":0,"ar":0,"loanAr":0,"inventory":0,"oca":0,"deposit":0,"ppe":0,"intangible":0,"ap":0,"shortLoan":0,"longLoan":0,"taxPay":0,"ocl":0,"longLoanNC":0,"directorLoan":0,"capital":0,"reBegin":0}
หมายเหตุ: rev=รายได้หลัก, otherRev=รายได้อื่น, cogs=ต้นทุนขาย, admin=ค่าใช้จ่ายบริหาร, depExp=ค่าเสื่อมราคา, interestExp=ดอกเบี้ยจ่าย, tax=ภาษีนิติบุคคล, netIncome=กำไรสุทธิ, cash=เงินสด, ar=ลูกหนี้การค้า, loanAr=ลูกหนี้เงินกู้, inventory=สินค้าคงเหลือ, oca=สินทรัพย์หมุนเวียนอื่น, deposit=เงินมัดจำ, ppe=ที่ดินอาคารอุปกรณ์สุทธิ, intangible=สินทรัพย์ไม่มีตัวตน, ap=เจ้าหนี้การค้า, shortLoan=เงินกู้ระยะสั้น, longLoan=เงินกู้ยาวส่วนหมุนเวียน, taxPay=ภาษีค้างจ่าย, ocl=หนี้สินหมุนเวียนอื่น, longLoanNC=เงินกู้ยาวไม่หมุนเวียน, directorLoan=เงินกู้กรรมการ, capital=ทุนชำระแล้ว, reBegin=กำไรสะสมต้นปี`;

  let msgContent;
  if(useFile&&_aiFileData){
    const isImg=(_aiFileType||'').startsWith('image');
    if(isImg){
      msgContent=[
        {type:'image',source:{type:'base64',media_type:_aiFileType,data:_aiFileData}},
        {type:'text',text:prompt}
      ];
    }else{
      // PDF
      msgContent=[
        {type:'document',source:{type:'base64',media_type:'application/pdf',data:_aiFileData}},
        {type:'text',text:prompt}
      ];
    }
  }else{
    const text=document.getElementById('ai-text')?.value||'';
    if(!text.trim()){toast('กรุณาวางข้อความหรืออัปโหลดไฟล์ก่อน','warn');return;}
    msgContent=[{type:'text',text:prompt+'\n\nข้อมูลงบการเงิน:\n'+text}];
  }

  // Show progress
  const progEl=document.getElementById('ai-progress');
  const runBtn=document.getElementById('ai-run-btn');
  if(progEl)progEl.style.display='';
  if(runBtn){runBtn.disabled=true;runBtn.textContent='กำลังวิเคราะห์...';}

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5',
        max_tokens:1000,
        messages:[{role:'user',content:msgContent}]
      })
    });
    const data=await resp.json();
    if(data.error){toast('API Error: '+data.error.message,'err');return;}
    const txt=data.content?.[0]?.text||'';
    const m=txt.match(/\{[\s\S]*\}/);
    if(!m){toast('AI ไม่สามารถแยกตัวเลขได้ — ลองตรวจสอบคุณภาพไฟล์','err');console.log('AI raw:',txt);return;}
    autoMatch(JSON.parse(m[0]));
    closeModal();
    toast('นำเข้าสำเร็จ ✓ — กรุณาตรวจสอบและบันทึก','ok');
  }catch(e){
    toast('เกิดข้อผิดพลาด: '+e.message,'err');
    console.error(e);
  }finally{
    if(progEl)progEl.style.display='none';
    if(runBtn){runBtn.disabled=false;runBtn.textContent='✨ นำเข้าด้วย AI';}
  }
}
function autoMatch(parsed){
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd)return;
  if(!yd.base)yd.base=defaultBase();
  const fields=['rev','otherRev','cogs','admin','depExp','interestExp','tax','netIncome',
    'cash','ar','loanAr','inventory','oca','deposit','ppe','intangible',
    'ap','shortLoan','longLoan','taxPay','ocl','longLoanNC','directorLoan','capital','reBegin'];
  fields.forEach(f=>{
    if(parsed[f]!==undefined){
      yd.base[f]=parseFloat(parsed[f])||0;
      const el=document.getElementById(`b-${f}`);
      if(el)el.value=yd.base[f];
    }
  });
  yd.updatedAt=Date.now();
  saveYearLocal(S.currentCo,S.currentYear,yd);
  updateBaseCalcDisplay(yd.base);
}

  const yd=getYearData(S.currentCo,S.currentYear);

บริษัท: ${co?.name||''} ประเภท: ${co?.businessType||''} ปี: ${S.currentYear}
รายได้รวม: ${res.pl.totalRev.toLocaleString()} บาท กำไรสุทธิ: ${res.pl.netIncome.toLocaleString()} บาท
ร่างหมายเหตุประกอบงบการเงิน ตอบเป็น JSON:
{"revenueRecognition":"...","taxPolicy":"..."}`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:600,messages:[{role:'user',content:prompt}]})
    });
    const data=await resp.json();
    const m=(data.content?.[0]?.text||'').match(/\{[\s\S]*\}/);

function fillFromPrevYear(){
  const prevYr=getPrevYear(S.currentCo,S.currentYear);
  if(!prevYr){toast('ไม่มีข้อมูลปีก่อนหน้า','warn');return;}
  const prevData=getYearData(S.currentCo,prevYr);
  if(!prevData){toast('ไม่พบข้อมูลปี '+prevYr,'warn');return;}
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd)return;
  // Copy prev year's base (or draft if no base) to current year's base
  const src=prevData.base||defaultBase();
  if(!yd.base)yd.base=defaultBase();
  Object.keys(src).forEach(k=>{yd.base[k]=src[k];});
  saveYearLocal(S.currentCo,S.currentYear,yd);
  toast(`ดึงข้อมูลปี ${prevYr} มาเป็นปีฐานแล้ว`,'ok');
  render();
}

  if(!yr){toast('กรุณากรอกปี','err');return;}

  let newData={year:yr,status:'draft',base:defaultBase(),draft:defaultDraft(),settings:defaultSettings(),cf:defaultCF(),notes:defaultNotes(),bankAnalysis:defaultBankAnalysis(),scenarios:defaultScenarios(),reportSettings:defaultReportSettings(),updatedAt:Date.now()};
  if(copyFrom){
    const prev=getYearData(cId,copyFrom);
    if(prev){
      // Copy draft as new base, reset draft
      newData.base=Object.assign({},prev.draft||prev.base||{});
      // Also copy settings
      newData.settings=Object.assign({},prev.settings||defaultSettings());
    }
  }
  saveYearLocal(cId,yr,newData);
  fbSaveYear(cId,yr,newData);
  closeModal();
  toast('เพิ่มปี '+yr+' แล้ว','ok');
  if(S.view==='editor'&&S.currentCo===cId){
    S.currentYear=yr;S.editorTab='base';
  }
  render();
}

// ===== VALIDATION =====
let _pendingExportFn=null;
function proceedExport(){closeModal();if(_pendingExportFn){const f=_pendingExportFn;_pendingExportFn=null;f();}}

function validateBeforeExport(){
  const yd=getYearData(S.currentCo,S.currentYear);
  const co=getCompany(S.currentCo);
  if(!yd||!co)return[];
  const settings=Object.assign(defaultSettings(),yd.settings||{});
  const draft=Object.assign(defaultDraft(),yd.draft||{});
  const base=Object.assign(defaultBase(),yd.base||{});
  const res=compute(draft,settings);
  const bs=res.bs;const pl=res.pl;const kpi=res.kpi;
  const checks=[];
  function chk(label,ok,isWarn,msg){checks.push({label,status:ok?'ok':isWarn?'warn':'err',msg:ok?'ผ่าน':msg});}
  chk('ชื่อบริษัท',!!co.name,false,'กรุณากรอกชื่อบริษัท');
  chk('ปีที่เลือก',!!S.currentYear,false,'ไม่พบปีที่เลือก');
  chk('รายได้ปีฐาน',n(base.rev)>0||n(base.otherRev)>0,true,'ยังไม่ได้กรอกรายได้ปีฐาน');
  chk('งบดุลปีฐาน',n(base.capital)>0||n(base.cash)>0,true,'ยังไม่ได้กรอกงบดุลปีฐาน');
  chk('รายได้ร่างปรับใหม่',n(draft.rev)>0||n(draft.otherRev)>0,true,'ยังไม่ได้กรอกรายได้ร่างปรับใหม่');
  chk('งบดุลสมดุล',Math.abs(bs.diff)<1,Math.abs(bs.diff)<=100,
    Math.abs(bs.diff)<=100?`ส่วนต่าง ${fmtNum(bs.diff)} บาท (เล็กน้อย)`:`ส่วนต่าง ${fmtNum(bs.diff)} บาท — ต้องแก้ก่อน`);
  chk('เงินสดไม่ติดลบ',bs.cash>=0,false,`เงินสด ${fmtNum(bs.cash)} บาท — ติดลบ ธนาคารไม่ผ่าน`);
  chk('กำไรสุทธิ',pl.netIncome>=0,true,`กำไรสุทธิ ${fmtNum(pl.netIncome)} บาท — ติดลบ`);
  if(pl.pbt>0){
    const tp=pl.tax/pl.pbt;
    chk('อัตราภาษีสมเหตุผล',tp>=0.10,tp>=0.05,
      tp<0.05?`ภาษีเพียง ${(tp*100).toFixed(1)}% ของ PBT — ธนาคารตั้งคำถาม`:`ภาษี ${(tp*100).toFixed(1)}% ค่อนข้างต่ำ`);
  }
  chk('Current Ratio ≥ 1',kpi.currentRatio>=1,kpi.currentRatio<1.5,`Current Ratio ${kpi.currentRatio.toFixed(2)}`);
  chk('D/E Ratio ≤ 3',kpi.de<=3,kpi.de>2,`D/E ${kpi.de.toFixed(2)} — สูงเกินมาตรฐาน`);
  chk('ข้อมูลบริษัทครบ',!!(co.taxId&&co.director),true,'ยังไม่มีเลขทะเบียน/ชื่อกรรมการ');
  return checks;
}

function showValidationModal(proceedFn){
  _pendingExportFn=proceedFn;
  const checks=validateBeforeExport();
  const errCount=checks.filter(c=>c.status==='err').length;
  const warnCount=checks.filter(c=>c.status==='warn').length;
  const rows=checks.map(c=>`<tr>
    <td style="padding:5px 10px;white-space:nowrap;color:${c.status==='ok'?'var(--green)':c.status==='warn'?'var(--amber)':'var(--red)'};font-weight:600;font-size:12px">
      ${c.status==='ok'?'✓':c.status==='warn'?'⚠':'✕'} ${c.label}</td>
    <td style="padding:5px 10px;font-size:12px;color:var(--gray)">${c.msg||''}</td>
  </tr>`).join('');
  const summaryBg=errCount>0?'var(--red-lt)':warnCount>0?'var(--amber-lt)':'var(--green-lt)';
  const summaryColor=errCount>0?'#991B1B':warnCount>0?'#92400E':'#166534';
  const summaryMsg=errCount===0&&warnCount===0?'ตรวจสอบผ่านทุกรายการ — พร้อม Export'
    :(errCount>0?`พบ ${errCount} ข้อผิดพลาด`:'')+(errCount>0&&warnCount>0?' / ':'')+(warnCount>0?`${warnCount} คำเตือน`:'');
  showModal(`
  <div class="mh"><div class="mt">ตรวจสอบก่อน Export</div><button class="mc" onclick="closeModal()">×</button></div>
  <div style="background:${summaryBg};padding:10px 14px;border-radius:8px;color:${summaryColor};font-weight:600;font-size:13px;margin-bottom:12px">
    ${errCount>0?'✕':warnCount>0?'⚠':'✓'} ${summaryMsg}
  </div>
  <div style="overflow-x:auto;margin-bottom:16px">
    <table style="width:100%;border-collapse:collapse"><tbody>${rows}</tbody></table>
  </div>
  <div class="mf">
    <button class="btn btn-secondary" onclick="closeModal()">← กลับแก้ไข</button>
    <button class="btn ${errCount>0?'btn-danger':'btn-primary'}" onclick="proceedExport()">
      ${errCount>0?'Export ต่อไป (มีข้อผิดพลาด)':'Export'}
    </button>
  </div>`);
}

    ['  รับเงินกู้ระยะยาว',Z(cfRes.loanProceeds)],
    ['  ชำระคืนเงินกู้ระยะยาว',Z(cfRes.loanRepayment)],
    ['  เงินกู้ระยะสั้น เพิ่ม/(ลด)',Z(cfRes.dShortLoan)],
    ['  เงินกู้กรรมการ เพิ่ม/(ลด)',Z(cfRes.dDirectorLoan)],
    ['  จ่ายเงินปันผล',Z(cfRes.divPaid)],
    ['เงินสดสุทธิจากกิจกรรมจัดหาเงิน',Z(cfRes.finCF)],[],
    ['เงินสดเพิ่ม (ลด) สุทธิสำหรับปี',Z(cfRes.netCF)],
    ['เงินสดต้นปี',Z(cfRes.beginCash)],
    ['เงินสดปลายปี',Z(cfRes.endCash)],
  ]);
  ws4['!cols']=[{wch:38},{wch:20}];
  XLSX.utils.book_append_sheet(wb,ws4,'งบกระแสเงินสด');

  // Sheet 5: PPE Schedule (if data exists)
  const notes=yd.notes||defaultNotes();
  if((notes.ppeSchedule||[]).length>0){
    const ppeRows=[['รายการ','ราคาทุน','ค่าเสื่อมสะสม','มูลค่าสุทธิ','อัตรา%','ค่าเสื่อมปีนี้']];
    notes.ppeSchedule.forEach(r=>{ppeRows.push([r.name,N(r.cost),N(r.accDep),N(r.cost)-N(r.accDep),N(r.depRate),N(r.depYear)]);});
    const ws5=XLSX.utils.aoa_to_sheet([[cn],['ตารางที่ดิน อาคาร อุปกรณ์'],[`ณ วันที่ 31 ธันวาคม ${yr}`],[],...ppeRows]);
    ws5['!cols']=[{wch:28},{wch:16},{wch:16},{wch:16},{wch:10},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws5,'PPE Schedule');
  }

  // Sheet 6: Related Parties (if data exists)
  if((notes.relatedParties||[]).length>0){
    const rpRows=[['ชื่อ','ความสัมพันธ์','ประเภทรายการ','จำนวนเงิน','ยอดคงค้าง']];
    notes.relatedParties.forEach(r=>{rpRows.push([r.name,r.relation,r.txType,N(r.amount),N(r.balance)]);});
    const ws6=XLSX.utils.aoa_to_sheet([[cn],['รายการกับผู้เกี่ยวข้อง'],[`ปี ${yr}`],[],...rpRows]);
    ws6['!cols']=[{wch:25},{wch:18},{wch:22},{wch:16},{wch:16}];
    XLSX.utils.book_append_sheet(wb,ws6,'Related Parties');
  }

  // Sheet 7: Accounting Policies
  const pol=notes.accountingPolicies||{};
  const ws7=XLSX.utils.aoa_to_sheet([
    [cn],['นโยบายการบัญชีที่สำคัญ'],[`ปี ${yr}`],[],
    ['การรับรู้รายได้',pol.revenueRecognition||''],
    ['วิธีคิดมูลค่าสินค้าคงเหลือ',pol.inventoryMethod||'FIFO'],
    ['วิธีคำนวณค่าเสื่อมราคา',pol.ppeDepMethod||'SL'],
    ['นโยบายภาษีเงินได้',pol.taxPolicy||''],
  ]);
  ws7['!cols']=[{wch:32},{wch:50}];
  XLSX.utils.book_append_sheet(wb,ws7,'นโยบายการบัญชี');

  XLSX.writeFile(wb,`ProForma_${cn}_${yr}.xlsx`);
  toast('Export Excel แล้ว','ok');
}

// ===== PDF EXPORT =====
async function exportPDF(){
  const co=getCompany(S.currentCo);
  const yd=getYearData(S.currentCo,S.currentYear);
  if(!yd){toast('ไม่มีข้อมูล','err');return;}
  const checks=validateBeforeExport();
  if(checks.some(c=>c.status!=='ok')){showValidationModal(()=>exportPDF());return;}
  await _doExportPDF(co,yd);
}
async function _doExportPDF(co,yd){
  const settings=Object.assign(defaultSettings(),yd.settings||{});
  const draft=Object.assign(defaultDraft(),yd.draft||{});
  const base=Object.assign(defaultBase(),yd.base||{});
  const res=compute(draft,settings);
  const baseRes=computeBase(base);

  // Get previous year data if available
  const prevYr=getPrevYear(S.currentCo,S.currentYear);
  let prevData=null;
  if(prevYr){
    const pyd=getYearData(S.currentCo,prevYr);
    if(pyd){
      const pb=Object.assign(defaultBase(),pyd.base||pyd.draft||{});
      const pr=computeBase(pb);
      prevData={year:prevYr,base:pb,pl:pr.pl,bs:pr.bs};
    }
  }

  const cfInput=Object.assign(defaultCF(),yd.cf||{});
  const cfCalc=computeCF(base,draft,settings,cfInput,res);
  const payload={
    company:co,
    year:S.currentYear,
    prevYear:prevYr||null,
    current:{
      draft:res.d,
      settings,
      pl:res.pl,
      bs:res.bs
    },
    prev:prevData,
    cf:cfCalc
  };

  toast('กำลังสร้าง PDF...','');
  try{
    const resp=await fetch(PDF_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(!resp.ok)throw new Error(`Server error: ${resp.status}`);
    const blob=await resp.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`ProForma_${co?.name||''}_${S.currentYear}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
    toast('Export PDF แล้ว','ok');
  }catch(e){
    toast('ไม่สามารถสร้าง PDF ได้ — ตรวจสอบว่า server.py กำลังรันอยู่ที่ port 5055','err');
    console.error(e);
  }
}
